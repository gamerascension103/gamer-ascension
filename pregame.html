<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hero Education — Pre-Game Briefing | Gamer Ascension</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#c0392b;--gold:#c9a84c;--purple:#7f77dd;--green:#1d9e75;
  --bg:#080810;--border:rgba(255,255,255,0.06);
  --text:#f0ece4;--tdim:rgba(240,236,228,0.55);--tmuted:rgba(240,236,228,0.28);
}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text)}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(8,8,16,0.95);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.header-logo{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:.05em;color:var(--text);text-decoration:none;white-space:nowrap}
.header-logo span{color:var(--red)}
.header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.progress-label{font-size:10px;font-weight:300;color:var(--tmuted);letter-spacing:.06em;display:none}
.progress-pips{display:flex;gap:4px;margin-left:4px}
.pip{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);transition:all .4s ease;flex-shrink:0}
.pip.done{background:var(--red);border-color:var(--red);box-shadow:0 0 6px rgba(192,57,43,.6)}
.header-btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;padding:7px 12px;border-radius:3px;text-decoration:none;transition:background .2s;white-space:nowrap}
.header-btn:hover{background:#a93226}
@media(min-width:500px){
  .header{padding:0 24px}
  .header-logo{font-size:20px}
  .header-right{gap:16px}
  .progress-label{display:block}
  .header-btn{font-size:12px;padding:8px 16px}
}

/* CANVAS */
.nebula-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none}
.canvas-wrap{position:fixed;top:56px;left:0;right:0;bottom:0;overflow:hidden;cursor:grab;z-index:1}
.canvas-wrap.dragging{cursor:grabbing}
.canvas-inner{position:absolute;transform-origin:0 0;will-change:transform}

/* HINT */
.hint{position:fixed;left:20px;top:50%;transform:translateY(-50%);z-index:40;pointer-events:none;transition:opacity .6s;display:flex;flex-direction:column;align-items:center;gap:10px}
.hint.hidden{opacity:0}
.hint-inner{background:rgba(10,10,20,0.85);border:1px solid rgba(201,168,76,0.25);border-radius:4px;padding:14px 16px;backdrop-filter:blur(12px);display:flex;flex-direction:column;align-items:center;gap:8px}
.hint-text{font-family:'Cinzel',serif;font-size:10px;font-weight:400;letter-spacing:.1em;color:rgba(201,168,76,0.8);writing-mode:vertical-rl;text-orientation:mixed;transform:rotate(180deg)}
.hint-arrow{width:1px;height:32px;background:linear-gradient(to bottom,rgba(201,168,76,0),rgba(201,168,76,0.4));margin:0 auto}
.hint-pulse{width:8px;height:8px;border-radius:50%;background:rgba(201,168,76,0.6);animation:hint-blink 1.8s ease-in-out infinite}
@keyframes hint-blink{0%,100%{opacity:0.3;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ZOOM */
.zoom-controls{position:fixed;bottom:24px;right:24px;z-index:50;display:flex;flex-direction:column;gap:6px}
.zoom-btn{width:36px;height:36px;background:rgba(13,13,26,.9);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;backdrop-filter:blur(8px)}
.zoom-btn:hover{background:rgba(30,30,50,.9)}

/* RESPEC */

.respec-cancel{background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--tdim);font-size:13px;font-weight:300;padding:11px 22px;border-radius:3px;cursor:pointer;transition:all .2s}
.respec-cancel:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.respec-btn{position:fixed;bottom:24px;left:24px;z-index:50;width:36px;height:36px;background:rgba(13,13,26,.9);border:1px solid rgba(192,57,43,.2);border-radius:3px;color:rgba(192,57,43,.5);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px);opacity:0;pointer-events:none}
.respec-btn.visible{opacity:1;pointer-events:all}
.respec-btn:hover{background:rgba(192,57,43,.08);border-color:rgba(192,57,43,.5);color:var(--red)}
.respec-btn .respec-tooltip{position:absolute;left:44px;top:50%;transform:translateY(-50%);background:rgba(10,10,20,.95);border:1px solid rgba(192,57,43,.3);border-radius:4px;padding:6px 12px;white-space:nowrap;font-family:'Cinzel',serif;font-size:9px;letter-spacing:.08em;color:rgba(192,57,43,.8);opacity:0;pointer-events:none;transition:opacity .2s}
.respec-btn:hover .respec-tooltip{opacity:1}

/* RESPEC CONFIRM */
.respec-confirm{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center;background:rgba(8,8,16,.55);backdrop-filter:blur(6px);opacity:0;pointer-events:none;transition:opacity .3s}
.respec-confirm.open{opacity:1;pointer-events:all}
.respec-confirm-box{background:rgba(12,12,24,.97);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:36px 40px;max-width:400px;width:90%;text-align:center}
.respec-confirm-icon{font-size:28px;margin-bottom:16px;opacity:.7}
.respec-confirm-title{font-family:'Cinzel Decorative',serif;font-size:18px;color:var(--text);margin-bottom:10px;line-height:1.2}
.respec-confirm-body{font-size:13px;font-weight:300;color:var(--tdim);line-height:1.7;margin-bottom:24px}
.respec-confirm-actions{display:flex;gap:10px;justify-content:center}
.respec-confirm-yes{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:13px;font-weight:500;padding:10px 22px;border-radius:3px;border:none;cursor:pointer;transition:background .2s}
.respec-confirm-yes:hover{background:#a93226}
.respec-confirm-no{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--tdim);font-size:13px;font-weight:300;padding:10px 22px;border-radius:3px;cursor:pointer;transition:all .2s}
.respec-confirm-no:hover{border-color:rgba(255,255,255,.25);color:var(--text)}

/* NODE TOOLTIP */
.node-tooltip{position:fixed;z-index:150;background:rgba(10,10,20,.95);border:1px solid rgba(201,168,76,.3);border-radius:4px;padding:8px 14px;pointer-events:none;opacity:0;transition:opacity .15s;backdrop-filter:blur(8px);white-space:nowrap}
.node-tooltip.visible{opacity:1}
.node-tooltip-num{font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:3px}
.node-tooltip-name{font-size:13px;font-weight:500;color:var(--text)}
.node-tooltip-action{font-size:11px;font-weight:300;color:var(--tmuted);margin-top:2px}

/* NODE PANEL */
.node-panel{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,10,20,.98);border-top:1px solid rgba(255,255,255,.08);padding:28px 24px;transform:translateY(100%);transition:transform .35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(20px)}
.node-panel.open{transform:translateY(0)}
.node-panel-inner{max-width:520px;margin:0 auto}
.node-panel-pillar{font-family:'Cinzel',serif;font-size:9px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;margin-bottom:8px}
.node-panel-name{font-family:'Cinzel',serif;font-size:26px;font-weight:600;color:var(--text);margin-bottom:12px;line-height:1.1}
.node-panel-desc{font-size:14px;font-weight:300;color:var(--tdim);line-height:1.7;margin-bottom:20px}
.node-panel-actions{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.node-panel-btn{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:13px;font-weight:500;padding:11px 22px;border-radius:3px;text-decoration:none;border:none;cursor:pointer;transition:background .2s}
.node-panel-btn:hover{background:#a93226}
.node-panel-close{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid rgba(255,255,255,.12);color:var(--tdim);font-size:13px;font-weight:300;padding:11px 22px;border-radius:3px;cursor:pointer;transition:all .2s}
.node-panel-close:hover{border-color:rgba(255,255,255,.25);color:var(--text)}
.node-panel-locked{display:flex;flex-direction:column;gap:10px}
.node-panel-locked-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:rgba(192,57,43,.7)}
.node-panel-locked-actions{display:flex;gap:10px;flex-wrap:wrap}

/* LESSON OVERLAY */
.lesson-overlay{position:fixed;inset:0;z-index:300;background:rgba(7,7,15,.97);display:flex;flex-direction:column;transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1)}
.lesson-overlay.open{transform:translateY(0)}
.lesson-header{flex-shrink:0;padding:20px 32px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:rgba(13,13,26,.8)}
.lesson-eyebrow{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.lesson-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(24px,4vw,44px);color:var(--text);line-height:1}
.lesson-close{width:40px;height:40px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:3px;color:var(--text);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;flex-shrink:0}
.lesson-close:hover{background:rgba(255,255,255,.1)}
.lesson-progress-bar{height:2px;background:rgba(255,255,255,.06);flex-shrink:0}
.lesson-progress-fill{height:100%;background:var(--gold);width:0%;transition:width .3s}
.lesson-body{flex:1;overflow-y:auto;padding:40px 32px;max-width:800px;margin:0 auto;width:100%}
.lesson-footer{flex-shrink:0;padding:20px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.complete-btn{display:inline-flex;align-items:center;gap:10px;background:var(--gold);color:#0a0a0a;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:14px 28px;border-radius:3px;border:none;cursor:pointer;transition:background .2s,transform .15s}
.complete-btn:hover{background:#b8952e;transform:translateY(-1px)}
.complete-btn.done{background:var(--red);color:#fff}
.complete-btn:disabled{opacity:.6;cursor:default;transform:none}
.lesson-nav{display:flex;gap:10px}
.lesson-nav-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border);color:var(--tdim);font-size:12px;font-weight:300;padding:10px 16px;border-radius:3px;cursor:pointer;transition:all .2s}
.lesson-nav-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}

/* LESSON CONTENT */
.lc-intro{font-size:16px;font-weight:300;color:var(--tdim);line-height:1.8;margin-bottom:40px;padding-bottom:32px;border-bottom:1px solid var(--border);font-style:italic}
.lc-section{margin-bottom:40px}
.lc-section-num{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.lc-section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(20px,3vw,32px);color:var(--text);margin-bottom:16px;line-height:1}
.lc-body{font-size:15px;font-weight:300;color:var(--tdim);line-height:1.85;margin-bottom:16px}
.lc-body strong{font-weight:500;color:var(--text)}
.lc-callout{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:20px 24px;margin:20px 0}
.lc-callout-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.lc-callout-text{font-size:14px;font-weight:300;color:var(--text);line-height:1.7;font-style:italic}
.lc-red-callout{background:rgba(192,57,43,.06);border:1px solid rgba(192,57,43,.2);border-left:3px solid var(--red);border-radius:0 4px 4px 0;padding:20px 24px;margin:20px 0}
.lc-red-label{font-size:10px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--red);margin-bottom:8px}
.lc-red-text{font-size:14px;font-weight:300;color:var(--text);line-height:1.7}
.lc-phase-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:20px 0}
.lc-phase-card{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:4px;padding:16px 20px}
.lc-phase-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.lc-phase-name{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--text);margin-bottom:6px}
.lc-phase-body{font-size:13px;font-weight:300;color:var(--tdim);line-height:1.6}
.lc-steps{margin:16px 0}
.lc-step{display:flex;gap:16px;margin-bottom:20px;align-items:flex-start}
.lc-step-num{width:28px;height:28px;border-radius:50%;background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--gold);flex-shrink:0;margin-top:2px}
.lc-step-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:4px}
.lc-step-body{font-size:13px;font-weight:300;color:var(--tdim);line-height:1.65}
.lc-table{width:100%;border-collapse:collapse;margin:16px 0;font-size:13px}
.lc-table th{text-align:left;padding:10px 12px;font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--gold);border-bottom:1px solid rgba(201,168,76,.2)}
.lc-table td{padding:10px 12px;color:var(--tdim);border-bottom:1px solid var(--border);line-height:1.5}
.lc-table tr:last-child td{border-bottom:none}
.lc-divider{height:1px;background:var(--border);margin:32px 0}
.lc-two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin:16px 0}
.lc-col-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;padding:16px}
.lc-col-label{font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;color:var(--tmuted);margin-bottom:8px}
.lc-col-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:6px}
.lc-col-body{font-size:13px;font-weight:300;color:var(--tdim);line-height:1.6}
.lc-practice-stack{margin:20px 0}
.lc-practice-item{display:flex;align-items:center;gap:16px;padding:14px 16px;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:4px;margin-bottom:8px}
.lc-practice-icon{width:36px;height:36px;border-radius:3px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.lc-practice-title{font-size:14px;font-weight:500;color:var(--text);margin-bottom:2px}
.lc-practice-desc{font-size:12px;font-weight:300;color:var(--tdim)}

/* COMPLETION FLASH */
.completion-flash{position:fixed;inset:0;z-index:400;background:rgba(201,168,76,.08);pointer-events:none;opacity:0;transition:opacity .3s}
.completion-flash.active{opacity:1}

@media(max-width:600px){
  .lesson-body{padding:24px 20px}
  .lesson-header,.lesson-footer{padding:16px 20px}
  .lc-phase-grid,.lc-two-col{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header">
  <a href="/" class="header-logo">Gamer<span>Ascension</span></a>
  <div class="header-right">
    <span class="progress-label">Pre-game</span>
    <div class="progress-pips">
      <div class="pip" id="pip-0"></div>
      <div class="pip" id="pip-1"></div>
      <div class="pip" id="pip-2"></div>
      <div class="pip" id="pip-3"></div>
      <div class="pip" id="pip-4"></div>
    </div>
    <a href="https://calendly.com/straincoaching/insightcall" class="header-btn">Book a call →</a>
  </div>
</div>

<canvas class="nebula-canvas" id="nebulaCanvas"></canvas>

<div class="canvas-wrap" id="canvasWrap">
  <div class="canvas-inner" id="canvasInner">
    <svg id="treeSvg" xmlns="http://www.w3.org/2000/svg" style="overflow:visible"></svg>
  </div>
</div>

<div class="zoom-controls">
  <button class="zoom-btn" id="zoomIn">+</button>
  <button class="zoom-btn" id="zoomOut">−</button>
  <button class="zoom-btn" id="zoomReset">⌂</button>
</div>

<button class="respec-btn" id="respecBtn">
  ↺
  <span class="respec-tooltip">Respec Skill Points</span>
</button>

<div class="respec-confirm" id="respecConfirm">
  <div class="respec-confirm-box">
    <div class="respec-confirm-icon">⚗️</div>
    <div class="respec-confirm-title">Respec Skill Points</div>
    <div class="respec-confirm-body">This will reset all completed modules and return the orb to its dormant state. Your progress will be wiped — but the animations await.</div>
    <div class="respec-confirm-actions">
      <button class="respec-confirm-yes" id="respecConfirmYes">Reset everything</button>
      <button class="respec-confirm-no" id="respecConfirmNo">Cancel</button>
    </div>
  </div>
</div>

<div class="hint" id="hint">
  <div class="hint-inner">
    <div class="hint-pulse"></div>
    <div class="hint-arrow"></div>
    <div class="hint-text">Tap a node to begin</div>
    <div class="hint-arrow" style="transform:rotate(180deg)"></div>
    <div class="hint-text">Scroll to explore</div>
  </div>
</div>

<div class="node-tooltip" id="nodeTooltip">
  <div class="node-tooltip-num" id="ttNum"></div>
  <div class="node-tooltip-name" id="ttName"></div>
  <div class="node-tooltip-action" id="ttAction"></div>
</div>

<div class="node-panel" id="nodePanel">
  <div class="node-panel-inner">
    <div class="node-panel-pillar" id="nodePanelPillar"></div>
    <div class="node-panel-name" id="nodePanelName"></div>
    <div class="node-panel-desc" id="nodePanelDesc"></div>
    <div class="node-panel-actions" id="nodePanelActions"></div>
  </div>
</div>

<div class="lesson-overlay" id="lessonOverlay">
  <div class="lesson-header">
    <div>
      <div class="lesson-eyebrow" id="lessonEyebrow"></div>
      <div class="lesson-title" id="lessonTitle"></div>
    </div>
    <button class="lesson-close" onclick="closeLesson()">✕</button>
  </div>
  <div class="lesson-progress-bar"><div class="lesson-progress-fill" id="lessonProgressFill"></div></div>
  <div class="lesson-body" id="lessonBody" onscroll="updateReadProgress()"></div>
  <div class="lesson-footer">
    <div class="lesson-nav">
      <button class="lesson-nav-btn" id="prevBtn" onclick="navLesson(-1)">← Previous</button>
      <button class="lesson-nav-btn" id="nextBtn" onclick="navLesson(1)">Next →</button>
    </div>
    <button class="complete-btn" id="completeBtn" onclick="markComplete()">Mark as complete ✓</button>
  </div>
</div>

<div class="completion-flash" id="completionFlash"></div>

<script>
// ---- CONFIG ----
var W = 1800, H = 2400;
var CX = 900; // center x
var SPHERE_Y = 780; // sphere center y
var SPHERE_R = 130; // sphere radius

// Pre-game node positions — arc above sphere
var PREGAME_ANGLES = [-90, -45, 0, 45, 90]; // degrees, spread above sphere
var PREGAME_ORBIT = 300; // distance from sphere center

// Pillar root positions
var VITALITY_X = 300, SPIRIT_X = 900, ALIGNMENT_X = 1500;
var PILLAR_Y = 1100;

var completed = JSON.parse(localStorage.getItem('ga_pregame_v2_completed') || '[]');
var currentLesson = null;
var animState = {
  sphereCharge: completed.length / 5,
  flowActive: completed.length >= 5,
  energyParticles: [],
  flowParticles: []
};

// ---- NODE DATA ----
var PREGAME_NODES = [
  {id:'gap',       label:'01', angle:-90, locked:false},
  {id:'training',  label:'02', angle:-45, locked:false},
  {id:'nutrition', label:'03', angle:0,   locked:false},
  {id:'journaling',label:'04', angle:45,  locked:false},
  {id:'reading',   label:'05', angle:90,  locked:false},
];

var PILLAR_NODES = {
  vitality: [
    {id:'energy',   x:180,  y:1300, label:'Energy\nManagement'},
    {id:'recovery', x:300,  y:1480, label:'Recovery'},
    {id:'perfstate',x:420,  y:1300, label:'Performance\nState'},
    {id:'biomech',  x:150,  y:1640, label:'Biomechanics'},
    {id:'fuelsys',  x:300,  y:1640, label:'Fuel Systems'},
    {id:'neuro',    x:200,  y:1800, label:'Neuroscience\n& Exercise'},
    {id:'hormones', x:380,  y:1800, label:'Hormones'},
  ],
  spirit: [

var LESSONS = {
  gap:{eyebrow:'Pre-game briefing · Module 01 of 05 · Read this first',title:'The Gap & The Skill Curve',content:`<p class="lc-intro">This module names the thing you have been feeling and gives it a framework. The program makes more sense after you read it.</p><div class="lc-section"><div class="lc-section-num">Section 01</div><div class="lc-section-title">You have already built a hero</div><p class="lc-body">You did not do it on purpose. You probably never sat down and described this person clearly. But they exist.</p><p class="lc-body">Over your lifetime your mind has been quietly building an image of who you need to become. Not a specific person you are trying to copy. Not someone else's version of success. A composite — assembled from every story that moved you, every character you admired, every moment you witnessed strength or courage or purpose and felt something stir.</p><p class="lc-body">Gaming gave you some of it. The characters you played, the worlds you inhabited, the moments where you were capable and decisive and effective — those left marks. Culture gave you some of it. Family gave you some of it. Your own glimpses of your best self gave you some of it.</p><p class="lc-body"><strong>This is your hero. Your ideal self.</strong> The person your mind has decided you need to become.</p><div class="lc-callout"><div class="lc-callout-label">Why this drive is not optional</div><div class="lc-callout-text">The hero you built is your mind's best answer to the question every human being is always quietly asking: who do I need to become to fully belong to my own life? This drive is biological. The same force that drives survival drives the movement toward your ideal self. It does not switch off.</div></div><p class="lc-body">Most people have never examined this figure clearly. It runs silently. But it is never passive. You feel its presence most clearly in the moments when something is missing. When you know you could have handled that better. When you look at your life and feel the distance between what it is and what it could be.</p><p class="lc-body"><strong>That distance is the gap.</strong></p></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 02</div><div class="lc-section-title">The Hero's Journey — you already know this story</div><p class="lc-body">In the 1940s a scholar named Joseph Campbell spent years studying the myths, stories, and legends of cultures from every corner of the world. He found that across all of human history every great story follows the same arc. He called it the Hero's Journey. You already know it. You have lived it hundreds of times in every game that ever mattered to you.</p><div class="lc-steps"><div class="lc-step"><div class="lc-step-num">1</div><div><div class="lc-step-title">The ordinary world</div><div class="lc-step-body">Everyday life — familiar, safe, but somehow incomplete. The hero knows something is missing.</div></div></div><div class="lc-step"><div class="lc-step-num">2</div><div><div class="lc-step-title">The call</div><div class="lc-step-body">An invitation to something greater that would require growth, change, and facing difficulty they have never faced before.</div></div></div><div class="lc-step"><div class="lc-step-num">3</div><div><div class="lc-step-title">The refusal</div><div class="lc-step-body">Almost always, the hero resists first. The ordinary world is known. The journey is uncertain.</div></div></div><div class="lc-step"><div class="lc-step-num">4</div><div><div class="lc-step-title">The threshold crossing</div><div class="lc-step-body">The hero steps out of the ordinary world and into the journey. There is no going back to who they were.</div></div></div><div class="lc-step"><div class="lc-step-num">5</div><div><div class="lc-step-title">The trials</div><div class="lc-step-body">Challenges, setbacks, moments of failure and doubt. The hero is tested and changed by what they go through.</div></div></div><div class="lc-step"><div class="lc-step-num">6</div><div><div class="lc-step-title">The transformation and return</div><div class="lc-step-body">If they stay in it, they are transformed — returning not as who they were, but as the hero the story always suggested they could be.</div></div></div></div><div class="lc-red-callout"><div class="lc-red-label">Where you are right now</div><div class="lc-red-text">You are the hero of your own journey. Reading this, standing at the beginning of this program — you are at the threshold. The ordinary world is behind you. The call has been answered. The trials are ahead.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 03</div><div class="lc-section-title">The failure of the hero story</div><p class="lc-body">When the call goes unanswered long enough, something happens. Not just disappointment. Something deeper and more serious than that.</p><p class="lc-body">When the gap between who you are and who your hero is stays wide — when you feel the distance but cannot find a way to close it — the result is a specific kind of suffering. Not the suffering of a single bad event. The suffering of a story that is not being lived.</p><p class="lc-body">Gamers feel the gap with particular sharpness. Gaming gives you a space where the hero story does get lived — where you are capable, decisive, and moving toward something that matters. You log off and the contrast is real.</p><div class="lc-callout"><div class="lc-callout-label">This is not weakness</div><div class="lc-callout-text">This is what happens to a person whose drive toward their ideal self has found no adequate outlet. It is one of the most human experiences there is. If at any point during this program the weight of the gap feels like more than you can carry — reach out directly to your coach. That is what the relationship is for.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 04</div><div class="lc-section-title">You are here because the drive is still alive</div><p class="lc-body">You have not given up on the story. The drive toward your hero — toward the person you have spent a lifetime quietly building — is still running in you. That is not nothing. That is everything this program needs to work with.</p><p class="lc-body">This program exists for one reason: to give that drive somewhere to go. To take the force that has been generating the gap and turn it into the force that closes it. Systematically. Over 16 weeks.</p><p class="lc-body"><strong>The gap does not have to be permanent.</strong></p></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 05</div><div class="lc-section-title">The skill curve — what each phase actually feels like</div><p class="lc-body">The journey moves through four distinct phases. Each one feels different. Each one asks something different of you. Knowing what is coming does not make it easy — but it makes it legible. You will not mistake the Clunky phase for failure. You will not mistake the Clicking phase for luck. You will know exactly where you are and what it means.</p><div class="lc-phase-grid"><div class="lc-phase-card"><div class="lc-phase-label">Weeks 1–3</div><div class="lc-phase-name">Clunky</div><div class="lc-phase-body">The program has five components. Workouts. Food tracking. Journaling. Reading. Curriculum. In week one none of them flow yet.<br><br>If you have trained before, the friction is not what you expect. You know how to lift — but this is not your system. The exercises, the tempo, the structure are different from what you have done. Your instinct will be to modify, to swap, to do it your way. That instinct is the clunky phase talking. Trust the system anyway.<br><br>If you have never trained seriously before — the app, the videos, the form cues, all of it is new at once. You will wonder if you are doing it right. You probably will not be doing it perfectly. That is fine. Execution sharpens across weeks, not sessions.<br><br>Food tracking will throw up decisions you do not have answers to yet. Protein short, calories full. Calories short, protein hit. Ask your coach. But here is something worth knowing now and returning to every time the program gets hard — there is not a single decision in this program that will cause the system to collapse. Not in week one. Not in week twelve. The system is designed to absorb mistakes. Progress over perfection is not a consolation. It is the actual mechanic. You learn the principle that guides the decision, and then you make a better decision next time. That is the entire process.<br><br>Journaling feels like throwing a football for the first time. Write anyway. If nothing comes, start with what happened today. The material arrives after you begin, not before.<br><br>Nothing flowing yet is not a sign something is wrong. It is the expected state. Stay in it.</div></div><div class="lc-phase-card"><div class="lc-phase-label">Weeks 4–8</div><div class="lc-phase-name">Clicking</div><div class="lc-phase-body">The gym becomes familiar. You know the movements, you trust the program, and you stop wondering if you are doing it right. You start just doing it. Strength numbers move. Your body starts to look different.<br><br>The physical evidence arrives and it changes something — not just your motivation but your belief in yourself. In the Clunky phase you moved on faith alone. Now the evidence is building. Hope has somewhere to stand.<br><br>Food stops being something you figure out and becomes something you manage. The novelty fades and that is actually progress — you stop trying to make every meal exciting and start asking a better question: how do I make this sustainable and still enjoy it? That shift from novelty to solution is what long-term adherence looks like in its early form.<br><br>The habits are not fully automatic yet. But they are starting to feel like yours.</div></div><div class="lc-phase-card"><div class="lc-phase-label">Weeks 9–12</div><div class="lc-phase-name">Compounding</div><div class="lc-phase-body">Something has changed and you may not be able to name exactly what it is or when it happened.<br><br>The anxiety is quieter. The mental weight that was there at the start is lighter. Your mental health scores are up. Every client who reaches this phase experiences this. Not as a dramatic moment. Just one day you notice you are not sad anymore. That you do not feel beat down by life. That you are happy again. Well-being is not loud. It arrives quietly.<br><br>The things you have been doing start to feel like expressions of who you are rather than things you are trying to do. The gap between your current self and your hero is visibly smaller. Not because the hero moved. Because you did.<br><br>Old patterns will try to pull you back. Not just in this phase — for a long time. But this is not a fixed condition. We are what we practice. The nervous system rewires around what you repeatedly do, think, and feel. The old threat detection patterns lose their grip as new ones take their place. Different threats get calibrated. A different nervous system emerges. It just takes time. More time than twelve weeks. But twelve weeks is where it unmistakably begins.</div></div><div class="lc-phase-card"><div class="lc-phase-label">Weeks 13–16</div><div class="lc-phase-name">Choosing</div><div class="lc-phase-body">By now you have done things you would not have believed possible in week one.<br><br>Strength you did not have. Consistency you did not think you were capable of. A relationship with food and your body that does not punish you for being human. When something hard happens — a holiday, a binge, a bad week — you do not spiral into shame and quit. You get curious instead. You ask what happened, what it is telling you, and what you do next. That shift from self-punishment to self-inquiry is one of the most significant things this program builds. It is quiet. It hurts less than what came before it.<br><br>The social events and life obstacles that used to feel like threats are less intimidating now. Not because they got easier. Because you got stronger. And because you understand that not a single one of them can collapse the system.<br><br>You look at what you have built and you admire it. Not with arrogance. With the quiet recognition that you showed up when it was hard, stayed when it was uncomfortable, and became someone you actually respect.<br><br>This is the return. Not the end — the beginning of a life designed from solid ground. The hero did not just survive the trials. They were built by them.</div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 06</div><div class="lc-section-title">Friction as data</div><p class="lc-body">Every difficult moment in this program is information. Not a verdict. Information.</p><p class="lc-body">The missed workout is telling you something about your planning or your energy. The food plan slip is telling you something about where the friction lives. The journal entry that gets uncomfortable is telling you something true about yourself you have not fully seen yet.</p><div class="lc-callout"><div class="lc-callout-label">When friction appears</div><div class="lc-callout-text">The question is not: what is wrong with me? The question is: what is this telling me? Note it. Use it. Move on. Next rep.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 07</div><div class="lc-section-title">What this is going to ask of you</div><p class="lc-body">This is what your week looks like inside this program.</p><div class="lc-practice-stack"><div class="lc-practice-item"><div class="lc-practice-icon">⚔</div><div><div class="lc-practice-title">Prescribed workouts</div><div class="lc-practice-desc">3 to 5 sessions per week depending on your program. Structured, progressive, built specifically for you.</div></div></div><div class="lc-practice-item"><div class="lc-practice-icon">🍖</div><div><div class="lc-practice-title">Food plan</div><div class="lc-practice-desc">Every day. Protein and calories tracked consistently.</div></div></div><div class="lc-practice-item"><div class="lc-practice-icon">📓</div><div><div class="lc-practice-title">Journaling</div><div class="lc-practice-desc">1 to 3 times per week. Not a diary. A self-study practice that compounds across the program.</div></div></div><div class="lc-practice-item"><div class="lc-practice-icon">📚</div><div><div class="lc-practice-title">Reading</div><div class="lc-practice-desc">Every day. 10 minutes minimum. No ceiling.</div></div></div><div class="lc-practice-item"><div class="lc-practice-icon">🧠</div><div><div class="lc-practice-title">Curriculum</div><div class="lc-practice-desc">Worked through at your own pace alongside the program. The lessons that give everything else meaning.</div></div></div></div><p class="lc-body">This is a real commitment. There will be weeks where you do not want to show up for any of it. Show up anyway. Because the gap does not have to be permanent. Because the trials are the structure of the journey — and you have already crossed the threshold.</p></div>`},
  training:{eyebrow:'Pre-game briefing · Module 02 of 05 · Vitality',title:'Training',content:`<p class="lc-intro">Most people train on the wrong model. They think suffering is the point. It is not. This module gives you the actual system — so every session produces the maximum stimulus for the effort you put in.</p><div class="lc-section"><div class="lc-section-num">Section 01</div><div class="lc-section-title">What training actually is</div><p class="lc-body">Most people walk into a gym with the wrong model. They think the goal is to suffer — to feel the burn, to destroy themselves and rebuild. That model produces a lot of exhausted people who are not making much progress.</p><p class="lc-body">Here is the actual model. <strong>Muscle grows in response to one thing: mechanical tension</strong> — the internal force your muscle fibres produce when they contract against resistance. When that tension is high enough, your body activates Muscle Protein Synthesis — the biological mechanism that builds and reinforces muscle tissue.</p><p class="lc-body">Your muscle tissue does not respond to elapsed time. It does not respond to discomfort. It does not respond to how much you sweat. <strong>It responds to force demand placed on muscle fibres.</strong></p><div class="lc-callout"><div class="lc-callout-label">Think of it like this</div><div class="lc-callout-text">In a game, grinding low-level content for hours gives you almost no XP. You need the right difficulty — hard enough to trigger adaptation, manageable enough to repeat. Training works exactly the same way. The goal is not to be destroyed. It is to produce the right stimulus, recover, and repeat it consistently.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 02</div><div class="lc-section-title">How your body recruits muscle</div><p class="lc-body">Your muscles are not a single on/off switch. They are a hierarchy of motor units — bundles of muscle fibres controlled by a single nerve. Your body recruits them in order, from smallest to largest.</p><p class="lc-body">The large high-threshold motor units are the ones that grow the most. Your body only recruits them when it has to — when the load is heavy, or when fatigue has accumulated and the smaller fibres can no longer keep up.</p><div class="lc-callout"><div class="lc-callout-label">The RPG parallel</div><div class="lc-callout-text">Think of your motor units like a party roster. Your body always sends the weakest party members in first. The high-damage units only get deployed when things get hard enough to need them. You cannot access the best fighters without pushing far enough into the challenge.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 03</div><div class="lc-section-title">What an effective rep actually is</div><p class="lc-body">Not all reps are equal. The reps that actually drive muscle growth — <strong>effective reps</strong> — are the ones performed under full motor unit recruitment and high mechanical tension. Based on current evidence, this is approximately the final five reps before failure on any given set.</p><p class="lc-body">Early reps prepare the conditions. The growth stimulus is concentrated at the end of the set. <strong>Getting to those final reps is the job.</strong></p><div class="lc-red-callout"><div class="lc-red-label">The most common mistake</div><div class="lc-red-text">Stopping too early. If you end a set at 4 or 5 reps in reserve because it is uncomfortable, you never reach the reps that actually trigger adaptation. You spent resources on a dungeon run and left before the boss fight.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 04</div><div class="lc-section-title">Working sets vs warm-up sets</div><div class="lc-two-col"><div class="lc-col-card"><div class="lc-col-label">Warm-up sets</div><div class="lc-col-title">Loading the game</div><div class="lc-col-body">Raise temperature, rehearse the movement, prime the nervous system. Do not produce meaningful stimulus. If your warm-ups feel hard, your loads are wrong.</div></div><div class="lc-col-card"><div class="lc-col-label">Working sets</div><div class="lc-col-title">Actually playing</div><div class="lc-col-body">Performed at a load that brings you to 0–2 RIR by the final rep. This is where progress happens. Everything else is preparation.</div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 05</div><div class="lc-section-title">Reps in reserve — your target zone</div><p class="lc-body">RIR — Reps in Reserve — is an estimate of how many more reps you could complete before genuine mechanical failure. <strong>Your target in this program is 0–2 RIR on every working set.</strong></p><table class="lc-table"><tr><th>RIR</th><th>What it feels like</th><th>Your target?</th></tr><tr><td>4–5</td><td>Manageable. Could clearly keep going.</td><td>Too easy</td></tr><tr><td>3</td><td>Noticeably challenging. Capacity remains.</td><td>Short of target</td></tr><tr><td>2</td><td>Hard. Form requires active attention.</td><td>Entry point ✓</td></tr><tr><td>1</td><td>Very hard. Next rep is maximum effort.</td><td>In the zone ✓</td></tr><tr><td>0</td><td>Could not do another with good form.</td><td>In the zone ✓</td></tr></table></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 06</div><div class="lc-section-title">Tempo</div><p class="lc-body">Tempo is the speed and rhythm of your repetition. It exists to standardise how you execute each rep so your muscles receive a consistent, controlled stimulus every time.</p><div class="lc-steps"><div class="lc-step"><div class="lc-step-num" style="background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.3);color:var(--red)">E</div><div><div class="lc-step-title">Eccentric — 2 to 3 seconds</div><div class="lc-step-body">Fight gravity on the way down. Do not drop or surrender to the load. The eccentric phase is where a significant portion of mechanical tension lives.</div></div></div><div class="lc-step"><div class="lc-step-num" style="background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.3);color:var(--red)">T</div><div><div class="lc-step-title">Transition — pause and own the position</div><div class="lc-step-body">At the bottom before you drive up, and at the top before the next eccentric. No bouncing. No momentum shortcuts.</div></div></div><div class="lc-step"><div class="lc-step-num" style="background:rgba(192,57,43,.15);border-color:rgba(192,57,43,.3);color:var(--red)">C</div><div><div class="lc-step-title">Concentric — powerful but controlled</div><div class="lc-step-body">Intentional drive. Not a fling. Think of it as executing a move deliberately rather than button-mashing your way through it.</div></div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 07</div><div class="lc-section-title">The discomfort framework</div><p class="lc-body">Metabolic stress is not a meaningful growth driver. It is an unavoidable byproduct of high-effort training. Real, uncomfortable — but it does not drive muscle growth. <strong>Mechanical tension does that.</strong></p><div class="lc-red-callout"><div class="lc-red-label">The critical distinction</div><div class="lc-red-text">"This is very uncomfortable" is metabolic stress — not a reason to stop. "I cannot complete another rep with good form and tempo" is mechanical failure — this is where 0 RIR lives. When the burn tells you to stop, ask honestly: can I complete another rep with my prescribed tempo and good form? If yes, you have more reps to give.</div></div></div>`},
  nutrition:{eyebrow:'Pre-game briefing · Module 03 of 05 · Vitality',title:'Nutrition',content:`<p class="lc-intro">The food plan works. It works even better when you know what it is doing and why. Clients who understand the model make better decisions under pressure — especially when life gets complicated.</p><div class="lc-section"><div class="lc-section-num">Section 01</div><div class="lc-section-title">Energy balance — the physics</div><p class="lc-body">Your body runs on energy. That energy comes from food. When you take in more energy than you use, your body stores the extra as fat. When you use more than you take in, your body burns stored fat for fuel.</p><p class="lc-body"><strong>This is not a theory. It is physics.</strong> The same rules that govern everything else in the physical world govern your body. You cannot get around them — any more than you can mod your way out of a game's core engine.</p><div class="lc-callout"><div class="lc-callout-label">NEAT — the hidden variable</div><div class="lc-callout-text">Non-Exercise Activity Thermogenesis. All the movement you do outside of your workouts. Walking, standing, taking stairs. For a lot of people this burns as much as their actual training sessions. As you lose weight your body burns less energy. The answer is deliberate movement outside the gym.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 02</div><div class="lc-section-title">The two dials — protein and calories</div><p class="lc-body">Body composition comes down to two things. <strong>Protein and calories.</strong> These are the primary dials the food plan is built around. Everything else is secondary.</p><div class="lc-two-col"><div class="lc-col-card"><div class="lc-col-label">Primary dial 1</div><div class="lc-col-title">Calories</div><div class="lc-col-body">Total energy in. Eat less than you burn and you lose fat over time. The size of the difference controls how fast things change.</div></div><div class="lc-col-card"><div class="lc-col-label">Primary dial 2</div><div class="lc-col-title">Protein</div><div class="lc-col-body">Tells your body to hold onto muscle while calories are managed. Keeps you fuller. Your most important stat in this plan.</div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 03</div><div class="lc-section-title">The three macronutrients</div><table class="lc-table"><tr><th>Macro</th><th>Calories/g</th><th>Found in</th><th>Primary role</th></tr><tr><td><strong>Protein</strong></td><td>4 kcal</td><td>Meat, fish, eggs, dairy, legumes</td><td>Builds muscle. Most filling.</td></tr><tr><td><strong>Carbs</strong></td><td>4 kcal</td><td>Rice, oats, bread, potatoes, fruit</td><td>Primary fuel for brain and training.</td></tr><tr><td><strong>Fat</strong></td><td>9 kcal</td><td>Oils, nuts, avocado, fatty fish</td><td>Hormones, cell function, vitamins.</td></tr></table></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 04</div><div class="lc-section-title">No bad foods — the spectrum</div><p class="lc-body">There are no bad foods. Think of food on a spectrum instead. On one end: whole foods close to their natural state. Meat, fish, eggs, vegetables, fruit, rice, oats. We know exactly what these do in the body. They are predictable. <strong>Think of them as tried-and-tested gear with known stats.</strong></p><p class="lc-body">On the other end: highly processed foods with unknown long-term research. The plan defaults to whole foods — not because a cookie is a moral failure, but because whole foods are the better-understood option.</p><div class="lc-callout"><div class="lc-callout-label">Flexible tracking</div><div class="lc-callout-text">Hit your protein and calorie targets. Food choice within that is largely yours. Build most of your intake from whole foods — not as a hard rule, but as the default that serves your results better.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 05</div><div class="lc-section-title">Hunger, habit, and emotion</div><p class="lc-body">Three things feel like hunger. They are not all the same.</p><div class="lc-steps"><div class="lc-step"><div class="lc-step-num">H</div><div><div class="lc-step-title">True hunger</div><div class="lc-step-body">Builds slowly. You feel it in your body. It goes away when you eat. This is the signal the food plan is designed around.</div></div></div><div class="lc-step"><div class="lc-step-num">B</div><div><div class="lc-step-title">Habitual hunger</div><div class="lc-step-body">A learned response. Your body expects food at certain times because that is what has always happened. The signal is real. The need is not always. It passes on its own — like a quest prompt you can dismiss.</div></div></div><div class="lc-step"><div class="lc-step-num">E</div><div><div class="lc-step-title">Emotional eating</div><div class="lc-step-body">Eating in response to a feeling rather than physical need. The food does not fix the feeling. You just need to notice that the signal is not coming from your body before you act on it.</div></div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 06</div><div class="lc-section-title">When slips happen</div><p class="lc-body">They are part of the skill curve. When one occurs, note what created the conditions — poor planning, a busy day, a social situation. Use that information to adjust. Then move on.</p><div class="lc-red-callout"><div class="lc-red-label">The only rule after a slip</div><div class="lc-red-text">Data not drama. Next rep. Six solid days out of seven beats three perfect days followed by four days off the plan. Every time.</div></div></div>`},
  journaling:{eyebrow:'Pre-game briefing · Module 04 of 05 · Daily practice',title:'Journaling',content:`<p class="lc-intro">Most people think they know how to journal because they have written things down before. What they have usually done is venting or gratitude listing. Neither of those is what this program is asking you to do. This is different.</p><div class="lc-section"><div class="lc-section-num">Section 01</div><div class="lc-section-title">What this practice actually is</div><p class="lc-body">The journal is a self-study tool. Think of yourself as a scientist studying a subject. The subject is you.</p><p class="lc-body">A scientist does not judge the data. They observe it, record it honestly, and look for what it is telling them. That is exactly what you are doing here. You are not writing to feel better. You are not writing to impress anyone. <strong>You are writing to see yourself clearly.</strong></p><div class="lc-callout"><div class="lc-callout-label">The skill this builds</div><div class="lc-callout-text">Over time this practice develops your ability to observe your own inner experience without being swept away by it. You cannot change patterns you cannot see. The journal is where you learn to see. Think of it as turning on your minimap in an area you have been navigating blind.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 02</div><div class="lc-section-title">Why observation comes first</div><p class="lc-body">Before you can extract anything useful from an experience you have to see it honestly. Most people skip straight to conclusions — "I failed because I am lazy" or "that happened because of someone else." Neither of those is observation. Both are stories.</p><div class="lc-callout"><div class="lc-callout-label">Observation sounds like this</div><div class="lc-callout-text">"I skipped the workout. I had planned to go at 6pm. At 5pm I started feeling tired and told myself I would go tomorrow instead. I did not feel guilty until the next morning." That is data. No judgment. No story. Just what happened, when it happened, and what you felt.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 03</div><div class="lc-section-title">The extraction — turning struggle into wisdom</div><p class="lc-body">Once you have observed honestly, you move to the second part of the practice. Ask yourself one question:</p><div class="lc-red-callout"><div class="lc-red-label">The extraction question</div><div class="lc-red-text">If I were to create a point of wisdom from this struggle, what would it look like?</div></div><p class="lc-body">This reframe shifts your relationship to the struggle. The hard week becomes a lesson. The missed workout becomes data about your planning. Every difficult experience contains a drop — you just have to run the entry all the way to the end to collect it.</p><div class="lc-two-col"><div class="lc-col-card"><div class="lc-col-label">Movement 1</div><div class="lc-col-title">Observe</div><div class="lc-col-body">What happened, what you thought, what you felt. No judgment. Just what is true.</div></div><div class="lc-col-card"><div class="lc-col-label">Movement 2</div><div class="lc-col-title">Extract</div><div class="lc-col-body">What does this teach you? What would you do differently? What is the lesson this struggle contains?</div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 04</div><div class="lc-section-title">Finish what you start</div><p class="lc-body">When an entry gets uncomfortable, the instinct is to stop. Do not stop. The discomfort is not a signal that you have gone far enough. It is a signal that you are getting close to something real.</p><div class="lc-callout"><div class="lc-callout-label">The training parallel</div><div class="lc-callout-text">Stopping in the middle of a difficult entry is the journaling equivalent of stopping a set at 4 RIR. You did the work but missed the reps that actually matter. Run the entry all the way to the wisdom extraction while the experience is still alive. That is where the XP lives.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 05</div><div class="lc-section-title">Length and format</div><p class="lc-body">There is no required length. There is no timer. There is no format to follow. The entry is as long as the struggle requires. A good day might be three sentences. A hard week might be two pages. <strong>Both are correct.</strong></p><p class="lc-body">When you have moved through honest observation and wisdom extraction, the entry is complete. That is the only finish line.</p></div>`},
  reading:{eyebrow:'Pre-game briefing · Module 05 of 05 · Daily practice',title:'Reading',content:`<p class="lc-intro">Who you are right now was built from what you have been exposed to so far. To become someone different, you need different inputs. That is what this practice is for.</p><div class="lc-section"><div class="lc-section-num">Section 01</div><div class="lc-section-title">Why you have to learn from other people</div><p class="lc-body">Who you are right now is a direct result of what you have been exposed to so far. Your beliefs, your habits, your reactions, your ceiling — all of it was built from the inputs you received.</p><p class="lc-body">If you want to become a different person, you need different inputs. Other people have done the work. They have lived through the struggles, extracted the lessons, and written them down. <strong>Reading is how you access decades of someone else's hard-won understanding in a few hours.</strong></p><div class="lc-callout"><div class="lc-callout-label">The RPG parallel</div><div class="lc-callout-text">Every RPG teaches you this. You cannot unlock a skill you have never been exposed to. You find the master, learn the technique, absorb the knowledge — and then you can use it. Reading is that mechanic in real life. The success library is your skill tree. The books are the unlocks.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 02</div><div class="lc-section-title">What 10 minutes a day actually does</div><p class="lc-body">Ten minutes is the minimum. Not the goal. Not the ceiling. The floor.</p><p class="lc-body">If you sit down, open the book, and find yourself still reading at 30 minutes — keep going. Small daily sessions that seem insignificant in isolation <strong>compound into something significant.</strong> This is passive XP that runs in the background every single day.</p></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 03</div><div class="lc-section-title">How to read so it lands</div><p class="lc-body"><strong>Active reading is different. You are not reading to finish. You are reading to be changed.</strong></p><div class="lc-steps"><div class="lc-step"><div class="lc-step-num">1</div><div><div class="lc-step-title">Mark it</div><div class="lc-step-body">When something hits — underline it, star it, write in the margin.</div></div></div><div class="lc-step"><div class="lc-step-num">2</div><div><div class="lc-step-title">Keep reading</div><div class="lc-step-body">Finish the chapter. Context matters. What hit you mid-chapter often means something different once you see where it lands.</div></div></div><div class="lc-step"><div class="lc-step-num">3</div><div><div class="lc-step-title">Share it</div><div class="lc-step-body">When something really connects — share it in the Strain Coaching app. Drop it in the community chat or send it directly to your coach.</div></div></div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 04</div><div class="lc-section-title">How to choose your book — the pain point selector</div><div class="lc-steps"><div class="lc-step"><div class="lc-step-num">★</div><div><div class="lc-step-title">Struggling to believe change is possible</div><div class="lc-step-body">The Courage To Be Disliked · The Magic of Thinking Big · Atomic Habits</div></div></div><div class="lc-step"><div class="lc-step-num">★</div><div><div class="lc-step-title">Struggling to control reactions or emotional state</div><div class="lc-step-body">Can't Hurt Me · Unfuck Yourself · Don't Believe Everything You Think</div></div></div><div class="lc-step"><div class="lc-step-num">★</div><div><div class="lc-step-title">Struggling to know what you want or why this matters</div><div class="lc-step-body">Resilience · Mastery · Third Circle Theory</div></div></div><div class="lc-step"><div class="lc-step-num">★</div><div><div class="lc-step-title">Overthinking, anxiety, or low mood</div><div class="lc-step-body">No Self No Problem · The Power of Now · 101 Essays That Will Change The Way You Think</div></div></div><div class="lc-step"><div class="lc-step-num">★</div><div><div class="lc-step-title">New to reading — need something that pulls you in fast</div><div class="lc-step-body">Can't Hurt Me · Atomic Habits · Unfuck Yourself</div></div></div></div><div class="lc-callout"><div class="lc-callout-label">Core identity reads — every client works through these eventually</div><div class="lc-callout-text">The Courage To Be Disliked is the philosophical backbone of this program. No Self No Problem and Resilience sit alongside it. These are not necessarily your first books. They are the ones you grow into as the program deepens. When you are ready for them, you will know.</div></div></div><div class="lc-divider"></div><div class="lc-section"><div class="lc-section-num">Section 05</div><div class="lc-section-title">The briefing is complete</div><p class="lc-body">You know the system. You know the why. You know what each week asks of you. You know that friction is data and not a verdict. You know the hero's journey — and you know you are already in it.</p><div class="lc-red-callout"><div class="lc-red-label">You have answered the call</div><div class="lc-red-text">The threshold is behind you. The journey starts now. Now go begin Phase 1.</div></div></div>`}

// ---- TREE CANVAS ----
var treeCanvas, treeCtx;
var t = 0;
var drag = {active:false,moved:false,pending:false,startX:0,startY:0,startTX:0,startTY:0};
var pinch = {active:false,startDist:0,startScale:0};
var transform = {x:0,y:0,scale:1};
var hintTimer;

// Particle systems
var energyParticles = []; // node -> sphere
var flowParticles = [];   // sphere -> pillars
var sphereIgnited = false;
var ignitePulse = 0;

// Dormant pulse waves — travel down branches when tree is inactive
var pulseWaves = [];
var pulseTimer = 0;

function nodePos(n){
  var rad = n.angle * Math.PI / 180;
  return {
    x: CX + Math.cos(rad) * PREGAME_ORBIT,
    y: SPHERE_Y + Math.sin(rad) * PREGAME_ORBIT
  };
}

function getCompletedCount(){ return completed.length; }

function initTreeCanvas(){
  treeCanvas = document.createElement('canvas');
  treeCanvas.width = W;
  treeCanvas.height = H;
  treeCanvas.style.position = 'absolute';
  treeCanvas.style.top = '0';
  treeCanvas.style.left = '0';
  treeCanvas.style.pointerEvents = 'none';
  treeCanvas.style.zIndex = '1';
  document.getElementById('canvasInner').appendChild(treeCanvas);
  treeCtx = treeCanvas.getContext('2d');

  // Add SVG overlay for click targets
  var svg = document.getElementById('treeSvg');
  svg.setAttribute('width', W);
  svg.setAttribute('height', H);
  svg.style.position = 'absolute';
  svg.style.top = '0';
  svg.style.left = '0';
  svg.style.zIndex = '2';
  svg.style.pointerEvents = 'all';

  buildClickTargets();
}

function buildClickTargets(){
  var svg = document.getElementById('treeSvg');
  svg.innerHTML = '';

  // Pregame nodes
  PREGAME_NODES.forEach(function(n, i){
    var pos = nodePos(n);
    var isUnlocked = i === 0 || completed.includes(PREGAME_NODES[i-1].id);
    var isDone = completed.includes(n.id);
    var g = document.createElementNS('http://www.w3.org/2000/svg','circle');
    g.setAttribute('cx', pos.x);
    g.setAttribute('cy', pos.y);
    g.setAttribute('r', 44);
    g.setAttribute('fill','transparent');
    g.setAttribute('stroke','none');
    g.style.cursor = (isUnlocked || isDone) ? 'pointer' : 'default';
    g.addEventListener('mousedown', function(e){ e.stopPropagation(); });
    g.addEventListener('click', function(e){
      e.stopPropagation();
      if(!drag.moved) openNodePanel(n.id);
    });
    g.addEventListener('mouseenter', function(e){ showTooltip(e, n.id, isDone); });
    g.addEventListener('mouseleave', hideTooltip);
    g.addEventListener('mousemove', moveTooltip);
    svg.appendChild(g);
  });

  // Pillar nodes
  ['vitality','spirit','alignment'].forEach(function(pillar){
    PILLAR_NODES[pillar].forEach(function(n){
      var g = document.createElementNS('http://www.w3.org/2000/svg','circle');
      g.setAttribute('cx', n.x);
      g.setAttribute('cy', n.y);
      g.setAttribute('r', 30);
      g.setAttribute('fill','transparent');
      g.setAttribute('stroke','none');
      g.style.cursor = 'pointer';
      g.addEventListener('mousedown', function(e){ e.stopPropagation(); });
      g.addEventListener('click', function(e){
        e.stopPropagation();
        if(!drag.moved) openNodePanel(n.id);
      });
      g.addEventListener('mouseenter', function(e){ showTooltip(e, n.id, false); });
      g.addEventListener('mouseleave', hideTooltip);
      g.addEventListener('mousemove', moveTooltip);
      svg.appendChild(g);
    });
  });
}

// ---- DRAW ----
function drawFrame(){
  treeCtx.clearRect(0,0,W,H);
  t++;

  // Page title
  treeCtx.save();
  treeCtx.textAlign = 'center';
  treeCtx.font = '700 52px Cinzel Decorative, serif';
  treeCtx.fillStyle = 'rgba(201,168,76,0.12)';
  treeCtx.fillText('Pillars of Ascension', CX, 52);
  treeCtx.font = '700 52px Cinzel Decorative, serif';
  treeCtx.fillStyle = 'rgba(201,168,76,0.55)';
  treeCtx.fillText('Pillars of Ascension', CX, 50);
  // Subtitle
  treeCtx.font = '400 13px Cinzel, serif';
  treeCtx.fillStyle = 'rgba(240,236,228,0.22)';
  treeCtx.letterSpacing = '0.12em';
  treeCtx.fillText('Hero Identity Gap Program · Pre-Game Briefing', CX, 74);
  // Decorative line
  treeCtx.strokeStyle = 'rgba(201,168,76,0.2)';
  treeCtx.lineWidth = 0.5;
  treeCtx.beginPath();
  treeCtx.moveTo(CX - 280, 84);
  treeCtx.lineTo(CX + 280, 84);
  treeCtx.stroke();
  treeCtx.restore();

  var charge = Math.min(1, completed.length / 5);
  if(completed.length >= 5 && !sphereIgnited){
    sphereIgnited = true;
    triggerIgnition();
  }

  drawConnections();
  drawSphere(charge);
  drawPregameNodes();
  drawPillarBranches();
  drawPillarNodes();
  updateParticles();
  if(completed.length < 5) updatePulseWaves(charge);

  requestAnimationFrame(drawFrame);
}

function drawConnections(){
  var allDone = completed.length >= 5;
  // Lines from sphere to pillar roots
  [[VITALITY_X, PILLAR_Y, '#ff6644'], [SPIRIT_X, PILLAR_Y, '#bb99ff'], [ALIGNMENT_X, PILLAR_Y, '#55ffaa']].forEach(function(p){
    var alpha = allDone ? 0.35 : 0.06;
    var lineW = allDone ? 1.5 : 0.8;
    treeCtx.save();
    treeCtx.strokeStyle = p[2];
    treeCtx.lineWidth = lineW;
    treeCtx.globalAlpha = alpha;
    treeCtx.setLineDash(allDone ? [] : [4,6]);
    treeCtx.beginPath();
    treeCtx.moveTo(CX, SPHERE_Y);
    treeCtx.lineTo(p[0], p[1]);
    treeCtx.stroke();
    treeCtx.restore();

    if(allDone){
      // Glow
      treeCtx.save();
      treeCtx.strokeStyle = p[2];
      treeCtx.lineWidth = 8;
      treeCtx.globalAlpha = 0.08;
      treeCtx.beginPath();
      treeCtx.moveTo(CX, SPHERE_Y);
      treeCtx.lineTo(p[0], p[1]);
      treeCtx.stroke();
      treeCtx.restore();
    }
  });
}

function drawSphere(charge){
  var cx = CX, cy = SPHERE_Y, r = SPHERE_R;
  var pulse = 1 + Math.sin(t * 0.02) * 0.03;
  var pr = r * pulse;

  // Outer bloom
  if(charge > 0){
    var bloomR = pr + 60 + charge * 40;
    var bloom = treeCtx.createRadialGradient(cx,cy,pr*0.5,cx,cy,bloomR);
    var goldA = charge * 0.12;
    bloom.addColorStop(0, 'rgba(201,168,76,'+goldA+')');
    bloom.addColorStop(0.5,'rgba(192,57,43,'+(goldA*0.5)+')');
    bloom.addColorStop(1, 'rgba(0,0,0,0)');
    treeCtx.fillStyle = bloom;
    treeCtx.beginPath();
    treeCtx.arc(cx,cy,bloomR,0,Math.PI*2);
    treeCtx.fill();
  }

  // Ignition pulse
  if(sphereIgnited && ignitePulse > 0){
    treeCtx.save();
    treeCtx.strokeStyle = '#ffdd55';
    treeCtx.lineWidth = 3;
    treeCtx.globalAlpha = ignitePulse * 0.8;
    treeCtx.beginPath();
    treeCtx.arc(cx,cy,pr + (1-ignitePulse)*200,0,Math.PI*2);
    treeCtx.stroke();
    treeCtx.restore();
    ignitePulse = Math.max(0, ignitePulse - 0.008);
  }

  // Main sphere body
  var grad = treeCtx.createRadialGradient(cx-pr*0.3, cy-pr*0.3, 0, cx, cy, pr);
  if(charge === 0){
    grad.addColorStop(0,'rgba(40,30,60,0.8)');
    grad.addColorStop(0.6,'rgba(20,15,40,0.9)');
    grad.addColorStop(1,'rgba(10,8,20,0.95)');
  } else if(charge < 1){
    var r1 = Math.round(40 + charge*160);
    var g1 = Math.round(30 + charge*100);
    var b1 = Math.round(60 + charge*20);
    grad.addColorStop(0,'rgba('+r1+','+g1+','+b1+',0.9)');
    grad.addColorStop(0.5,'rgba('+Math.round(r1*0.6)+','+Math.round(g1*0.5)+','+Math.round(b1*0.8)+',0.85)');
    grad.addColorStop(1,'rgba(10,8,20,0.95)');
  } else {
    var ig = 1 + Math.sin(t*0.03)*0.05;
    grad.addColorStop(0,'rgba(255,220,80,0.95)');
    grad.addColorStop(0.3,'rgba(220,100,30,0.9)');
    grad.addColorStop(0.7,'rgba(150,40,80,0.85)');
    grad.addColorStop(1,'rgba(10,8,20,0.95)');
  }
  treeCtx.fillStyle = grad;
  treeCtx.beginPath();
  treeCtx.arc(cx,cy,pr,0,Math.PI*2);
  treeCtx.fill();

  // Outer ring
  treeCtx.save();
  treeCtx.strokeStyle = charge >= 1 ? '#ffdd55' : (charge > 0 ? 'rgba(201,168,76,'+(0.3+charge*0.5)+')' : 'rgba(255,255,255,0.08)');
  treeCtx.lineWidth = charge >= 1 ? 2 : 1;
  treeCtx.globalAlpha = 1;
  if(charge >= 1) treeCtx.shadowBlur = 20;
  treeCtx.beginPath();
  treeCtx.arc(cx,cy,pr,0,Math.PI*2);
  treeCtx.stroke();
  treeCtx.restore();

  // Inner ring
  treeCtx.save();
  treeCtx.strokeStyle = charge > 0 ? 'rgba(255,200,50,'+(charge*0.4)+')' : 'rgba(255,255,255,0.04)';
  treeCtx.lineWidth = 0.5;
  treeCtx.beginPath();
  treeCtx.arc(cx,cy,pr*0.65,0,Math.PI*2);
  treeCtx.stroke();
  treeCtx.restore();

  // Energy fill arc — shows charge level
  if(charge > 0 && charge < 1){
    treeCtx.save();
    treeCtx.strokeStyle = '#c9a84c';
    treeCtx.lineWidth = 3;
    treeCtx.globalAlpha = 0.8;
    treeCtx.lineCap = 'round';
    treeCtx.beginPath();
    treeCtx.arc(cx,cy,pr+6,-Math.PI/2,-Math.PI/2 + charge*Math.PI*2);
    treeCtx.stroke();
    // Glow on arc
    treeCtx.strokeStyle = '#ffdd55';
    treeCtx.lineWidth = 8;
    treeCtx.globalAlpha = 0.15;
    treeCtx.beginPath();
    treeCtx.arc(cx,cy,pr+6,-Math.PI/2,-Math.PI/2 + charge*Math.PI*2);
    treeCtx.stroke();
    treeCtx.restore();
  }

  // Center dot
  treeCtx.save();
  treeCtx.fillStyle = charge >= 1 ? '#ffee88' : (charge > 0 ? 'rgba(201,168,76,0.8)' : 'rgba(255,255,255,0.15)');
  if(charge >= 1){
    treeCtx.shadowBlur = 15;
    treeCtx.shadowColor = '#ffdd55';
  }
  treeCtx.beginPath();
  treeCtx.arc(cx,cy,charge >= 1 ? 6 : 4,0,Math.PI*2);
  treeCtx.fill();
  treeCtx.restore();

  // Sphere label
  treeCtx.save();
  treeCtx.fillStyle = charge >= 1 ? 'rgba(255,220,80,0.9)' : 'rgba(240,236,228,0.2)';
  treeCtx.font = '400 10px Cinzel, serif';
  treeCtx.textAlign = 'center';
  treeCtx.letterSpacing = '0.1em';
  treeCtx.fillText(charge >= 1 ? 'READY' : (charge > 0 ? Math.round(charge*5)+' / 5' : 'PRE-GAME'), cx, cy + pr + 22);
  treeCtx.restore();
}

function drawPregameNodes(){
  PREGAME_NODES.forEach(function(n, i){
    var pos = nodePos(n);
    var isDone = completed.includes(n.id);
    var isNext = !isDone && (i === 0 || completed.includes(PREGAME_NODES[i-1].id));
    var isLocked = !isDone && !isNext;

    var r = 36;
    var pulse = isNext ? (1 + Math.sin(t * 0.04 + i) * 0.06) : 1;
    var pr = r * pulse;

    // Connection line to sphere
    var lineAlpha = isDone ? 0.7 : (isNext ? 0.25 : 0.06);
    treeCtx.save();
    if(isDone){
      // Glowing done line
      treeCtx.strokeStyle = '#c9a84c';
      treeCtx.lineWidth = 6;
      treeCtx.globalAlpha = 0.08;
      treeCtx.beginPath();
      treeCtx.moveTo(pos.x, pos.y);
      treeCtx.lineTo(CX, SPHERE_Y);
      treeCtx.stroke();
      treeCtx.strokeStyle = '#ffdd55';
      treeCtx.lineWidth = 1.5;
      treeCtx.globalAlpha = 0.7;
      treeCtx.beginPath();
      treeCtx.moveTo(pos.x, pos.y);
      treeCtx.lineTo(CX, SPHERE_Y);
      treeCtx.stroke();
      // White hot spine
      treeCtx.strokeStyle = 'rgba(255,255,255,0.5)';
      treeCtx.lineWidth = 0.5;
      treeCtx.globalAlpha = 1;
      treeCtx.beginPath();
      treeCtx.moveTo(pos.x, pos.y);
      treeCtx.lineTo(CX, SPHERE_Y);
      treeCtx.stroke();
    } else {
      treeCtx.strokeStyle = '#c9a84c';
      treeCtx.lineWidth = 0.8;
      treeCtx.globalAlpha = isNext ? 0.2 : 0.06;
      treeCtx.setLineDash([3,5]);
      treeCtx.beginPath();
      treeCtx.moveTo(pos.x, pos.y);
      treeCtx.lineTo(CX, SPHERE_Y);
      treeCtx.stroke();
    }
    treeCtx.restore();

    // Node outer bloom
    if(!isLocked){
      var bloomColor = isDone ? 'rgba(192,57,43,' : 'rgba(201,168,76,';
      var bgrad = treeCtx.createRadialGradient(pos.x,pos.y,pr,pos.x,pos.y,pr+50);
      bgrad.addColorStop(0, bloomColor+(isDone?'0.12':'0.08')+')');
      bgrad.addColorStop(1, bloomColor+'0)');
      treeCtx.fillStyle = bgrad;
      treeCtx.beginPath();
      treeCtx.arc(pos.x,pos.y,pr+50,0,Math.PI*2);
      treeCtx.fill();
    }

    // Node body
    var ngrad = treeCtx.createRadialGradient(pos.x-pr*0.3,pos.y-pr*0.3,0,pos.x,pos.y,pr);
    if(isDone){
      ngrad.addColorStop(0,'rgba(220,80,40,0.9)');
      ngrad.addColorStop(0.5,'rgba(160,40,30,0.8)');
      ngrad.addColorStop(1,'rgba(10,8,20,0.95)');
    } else if(isNext){
      ngrad.addColorStop(0,'rgba(220,180,60,0.7)');
      ngrad.addColorStop(0.5,'rgba(160,120,30,0.6)');
      ngrad.addColorStop(1,'rgba(10,8,20,0.9)');
    } else {
      ngrad.addColorStop(0,'rgba(30,25,50,0.6)');
      ngrad.addColorStop(1,'rgba(10,8,20,0.8)');
    }
    treeCtx.fillStyle = ngrad;
    treeCtx.beginPath();
    treeCtx.arc(pos.x,pos.y,pr,0,Math.PI*2);
    treeCtx.fill();

    // Outer stroke
    treeCtx.save();
    treeCtx.strokeStyle = isDone ? '#ff7755' : (isNext ? '#ffdd55' : 'rgba(255,255,255,0.08)');
    treeCtx.lineWidth = isDone ? 1.5 : (isNext ? 1.5 : 0.8);
    treeCtx.globalAlpha = isDone ? 1 : (isNext ? 0.8 : 0.3);
    if(isDone || isNext){
      treeCtx.shadowBlur = isNext ? 12 : 8;
      treeCtx.shadowColor = isDone ? '#ff7755' : '#ffdd55';
    }
    treeCtx.beginPath();
    treeCtx.arc(pos.x,pos.y,pr,0,Math.PI*2);
    treeCtx.stroke();
    treeCtx.restore();

    // Inner ring
    treeCtx.save();
    treeCtx.strokeStyle = isDone ? 'rgba(255,150,100,0.5)' : (isNext ? 'rgba(255,220,80,0.4)' : 'rgba(255,255,255,0.05)');
    treeCtx.lineWidth = 0.6;
    treeCtx.beginPath();
    treeCtx.arc(pos.x,pos.y,pr*0.62,0,Math.PI*2);
    treeCtx.stroke();
    treeCtx.restore();

    // Cardinal ticks
    if(!isLocked){
      [0,90,180,270].forEach(function(angle){
        var rad = angle*Math.PI/180;
        var ix = pos.x + Math.cos(rad)*(pr*0.62);
        var iy = pos.y + Math.sin(rad)*(pr*0.62);
        var ox = pos.x + Math.cos(rad)*(pr*0.62+5);
        var oy = pos.y + Math.sin(rad)*(pr*0.62+5);
        treeCtx.save();
        treeCtx.strokeStyle = isDone ? '#ff7755' : '#ffdd55';
        treeCtx.lineWidth = 1;
        treeCtx.globalAlpha = 0.6;
        treeCtx.beginPath();
        treeCtx.moveTo(ix,iy); treeCtx.lineTo(ox,oy);
        treeCtx.stroke();
        treeCtx.restore();
      });
    }

    // Center dot
    treeCtx.save();
    treeCtx.fillStyle = isDone ? '#ff9977' : (isNext ? '#ffdd55' : 'rgba(255,255,255,0.1)');
    if(!isLocked){treeCtx.shadowBlur=8; treeCtx.shadowColor=isDone?'#ff7755':'#ffdd55';}
    treeCtx.beginPath();
    treeCtx.arc(pos.x,pos.y, isDone?4:3,0,Math.PI*2);
    treeCtx.fill();
    treeCtx.restore();

    // Done checkmark
    if(isDone){
      treeCtx.save();
      treeCtx.fillStyle = '#ff9977';
      treeCtx.font = 'bold 18px DM Sans';
      treeCtx.textAlign = 'center';
      treeCtx.textBaseline = 'middle';
      treeCtx.shadowBlur = 10;
      treeCtx.shadowColor = '#ff7755';
      treeCtx.fillText('✓', pos.x, pos.y);
      treeCtx.restore();
    }

    // Next indicator
    if(isNext && !isDone){
      treeCtx.save();
      treeCtx.fillStyle = '#ffdd55';
      treeCtx.font = '400 10px Cinzel, serif';
      treeCtx.textAlign = 'center';
      treeCtx.globalAlpha = 0.7 + Math.sin(t*0.05)*0.3;
      treeCtx.fillText('START HERE', pos.x, pos.y + pr + 16);
      treeCtx.restore();
    }

    // Module number
    treeCtx.save();
    treeCtx.fillStyle = isDone ? 'rgba(255,150,100,0.7)' : (isNext ? 'rgba(255,220,80,0.6)' : 'rgba(240,236,228,0.15)');
    treeCtx.font = '400 10px Cinzel, serif';
    treeCtx.textAlign = 'center';
    treeCtx.fillText('0'+(i+1), pos.x, pos.y - pr - 10);
    treeCtx.restore();
  });
}

}

function updatePulseWaves(charge){
  pulseTimer++;
  // Spawn a new pulse wave every ~180 frames (~3 seconds)
  if(pulseTimer % 180 === 0){
    // Pick a random pillar to pulse down
    var pillars = [
      {sx:CX, sy:SPHERE_Y, ex:VITALITY_X, ey:PILLAR_Y, color:'rgba(192,57,43,', nodes: PILLAR_NODES.vitality},
      {sx:CX, sy:SPHERE_Y, ex:SPIRIT_X,   ey:PILLAR_Y, color:'rgba(127,119,221,', nodes: PILLAR_NODES.spirit},
      {sx:CX, sy:SPHERE_Y, ex:ALIGNMENT_X,ey:PILLAR_Y, color:'rgba(29,158,117,',  nodes: PILLAR_NODES.alignment},
    ];
    // Also send one down each pregame connection occasionally
    if(Math.random() < 0.4){
      PREGAME_NODES.forEach(function(n){
        if(!completed.includes(n.id)){
          var pos = nodePos(n);
          pulseWaves.push({
            sx: CX, sy: SPHERE_Y,
            ex: pos.x, ey: pos.y,
            progress: 0,
            speed: 0.004 + Math.random()*0.002,
            color: 'rgba(201,168,76,',
            size: 2.5,
            type: 'pregame'
          });
        }
      });
    }
    var p = pillars[Math.floor(Math.random()*pillars.length)];
    pulseWaves.push({
      sx: p.sx, sy: p.sy,
      ex: p.ex, ey: p.ey,
      progress: 0,
      speed: 0.003 + Math.random()*0.002,
      color: p.color,
      size: 2,
      nodes: p.nodes,
      type: 'pillar',
      childWaves: []
    });
  }

  // Draw and update pulse waves
  pulseWaves = pulseWaves.filter(function(pw){
    pw.progress += pw.speed;

    // Current position along the line
    var px = pw.sx + (pw.ex - pw.sx) * pw.progress;
    var py = pw.sy + (pw.ey - pw.sy) * pw.progress;

    // Fade in and out
    var alpha = Math.sin(pw.progress * Math.PI) * 0.5;

    // Draw the traveling dot
    treeCtx.save();
    treeCtx.fillStyle = pw.color + alpha + ')';
    treeCtx.shadowBlur = 12;
    treeCtx.shadowColor = pw.color + '0.6)';
    treeCtx.beginPath();
    treeCtx.arc(px, py, pw.size, 0, Math.PI*2);
    treeCtx.fill();

    // Trailing glow
    treeCtx.fillStyle = pw.color + (alpha * 0.3) + ')';
    treeCtx.shadowBlur = 20;
    treeCtx.beginPath();
    treeCtx.arc(px, py, pw.size * 2.5, 0, Math.PI*2);
    treeCtx.fill();
    treeCtx.restore();

    // When pillar pulse reaches root, spawn child waves to each pillar node
    if(pw.type === 'pillar' && pw.progress >= 0.95 && pw.nodes && pw.childWaves.length === 0){
      pw.nodes.forEach(function(n){
        pw.childWaves.push({
          sx: pw.ex, sy: pw.ey,
          ex: n.x, ey: n.y,
          progress: 0,
          speed: pw.speed * 0.85,
          color: pw.color,
          size: 1.5,
          type: 'child'
        });
      });
      pulseWaves = pulseWaves.concat(pw.childWaves);
    }

    return pw.progress < 1;
  });
}

function updateParticles(){
  // Energy particles: completed node -> sphere
  if(Math.random() < 0.15){
    PREGAME_NODES.forEach(function(n){
      if(completed.includes(n.id)){
        var pos = nodePos(n);
        if(Math.random() < 0.3){
          energyParticles.push({
            x:pos.x, y:pos.y,
            tx:CX, ty:SPHERE_Y,
            progress:0,
            speed: 0.003 + Math.random()*0.002,
            size: Math.random()*2+1,
            color:'rgba(255,200,50,'
          });
        }
      }
    });
  }

  // Flow particles: sphere -> pillars (only when all done)
  if(completed.length >= 5 && Math.random() < 0.2){
    var targets = [[VITALITY_X,PILLAR_Y,'rgba(255,100,68,'],[SPIRIT_X,PILLAR_Y,'rgba(187,153,255,'],[ALIGNMENT_X,PILLAR_Y,'rgba(85,255,170,']];
    var tgt = targets[Math.floor(Math.random()*targets.length)];
    flowParticles.push({
      x:CX, y:SPHERE_Y,
      tx:tgt[0], ty:tgt[1],
      progress:0,
      speed: 0.0025 + Math.random()*0.0015,
      size: Math.random()*2.5+1,
      color:tgt[2]
    });
  }

  // Draw and update energy particles
  energyParticles = energyParticles.filter(function(p){
    p.progress += p.speed;
    var ex = p.x + (p.tx-p.x)*p.progress;
    var ey = p.y + (p.ty-p.y)*p.progress;
    var alpha = Math.sin(p.progress * Math.PI);
    treeCtx.save();
    treeCtx.fillStyle = p.color + alpha + ')';
    treeCtx.shadowBlur = 6;
    treeCtx.shadowColor = '#ffdd55';
    treeCtx.beginPath();
    treeCtx.arc(ex,ey,p.size,0,Math.PI*2);
    treeCtx.fill();
    treeCtx.restore();
    return p.progress < 1;
  });

  // Draw and update flow particles
  flowParticles = flowParticles.filter(function(p){
    p.progress += p.speed;
    var ex = p.x + (p.tx-p.x)*p.progress;
    var ey = p.y + (p.ty-p.y)*p.progress;
    var alpha = Math.sin(p.progress * Math.PI);
    treeCtx.save();
    treeCtx.fillStyle = p.color + alpha + ')';
    treeCtx.shadowBlur = 8;
    treeCtx.shadowColor = p.color + '0.8)';
    treeCtx.beginPath();
    treeCtx.arc(ex,ey,p.size,0,Math.PI*2);
    treeCtx.fill();
    treeCtx.restore();
    return p.progress < 1;
  });
}

function triggerIgnition(){
  ignitePulse = 1;
  // Shoot burst of particles to all three pillars
  for(var i=0;i<30;i++){
    var targets = [[VITALITY_X,PILLAR_Y,'rgba(255,100,68,'],[SPIRIT_X,PILLAR_Y,'rgba(187,153,255,'],[ALIGNMENT_X,PILLAR_Y,'rgba(85,255,170,']];

      color:tgt[2]
    });
  }
}
