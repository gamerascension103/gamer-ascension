<head>

<!-- Animation library for living rift (Session 9 upgrade) — GSAP only.
     tsParticles was attempted but could not be made to render particles
     reliably in this rendering context. The SVG-based CSS embers remain
     the primary particle system for this page. -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#c0392b;--gold:#c9a84c;--violet:#7f77dd;
  --bg:#080810;--bg-deep:#04040a;--border:rgba(255,255,255,0.06);
  --text:#f0ece4;--tdim:rgba(240,236,228,0.55);--tmuted:rgba(240,236,228,0.28);
  --arcane:#9d8bff;--silver:#e0d8f0;--cyan:#7df5f5;
}
html,body{height:100%;overflow:hidden;background:var(--bg-deep);font-family:'DM Sans',sans-serif;font-weight:300;color:var(--text);position:fixed;width:100%}

/* NEBULA BACKGROUND */
.nebula{position:fixed;inset:0;z-index:0;pointer-events:none;background:
  radial-gradient(ellipse at 20% 30%, rgba(157,139,255,0.08) 0%, transparent 45%),
  radial-gradient(ellipse at 80% 70%, rgba(201,168,76,0.06) 0%, transparent 50%),
  radial-gradient(ellipse at 50% 90%, rgba(127,119,221,0.05) 0%, transparent 40%),
  var(--bg-deep);
}
.starfield{position:fixed;inset:0;z-index:1;pointer-events:none}
.star{position:absolute;background:#fff;border-radius:50%;opacity:0.6;animation:twinkle 4s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:0.15}50%{opacity:0.7}}

/* HEADER */
.header{position:fixed;top:0;left:0;right:0;z-index:100;height:56px;background:rgba(6,4,13,0.6);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(201,168,76,0.12);display:flex;align-items:center;justify-content:space-between;padding:0 18px}
.header-logo{font-family:'Cinzel',serif;font-size:13px;letter-spacing:.34em;color:rgba(240,236,228,0.75);text-decoration:none;white-space:nowrap;text-transform:uppercase;transition:color .25s}
.header-logo:hover{color:var(--gold-bright,#ffe5a0)}
.header-right{display:flex;align-items:center;gap:14px;flex-shrink:0}
.header-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;color:rgba(201,168,76,0.78);font-family:'Cinzel',serif;font-size:10px;font-weight:400;letter-spacing:.32em;text-transform:uppercase;padding:8px 18px;border:1px solid rgba(201,168,76,0.32);border-radius:1px;text-decoration:none;transition:all .3s;white-space:nowrap}
.header-btn:hover{color:var(--gold-bright,#ffe5a0);border-color:rgba(201,168,76,0.6);background:rgba(20,16,42,0.4);box-shadow:0 0 18px rgba(201,168,76,0.15)}
@media(min-width:768px){
  .header{padding:0 28px}
  .header-logo{font-size:14px}
  .header-right{gap:18px}
  .header-btn{font-size:11px;padding:9px 22px}
}

/* STAGE */
.stage{position:fixed;top:56px;left:0;right:0;bottom:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}

/* SCENES */
.scene{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;opacity:0;pointer-events:none;transition:opacity .8s ease;overflow-y:auto}
.scene.active{opacity:1;pointer-events:auto}
.scene.exiting{opacity:0;pointer-events:none}

/* ============================================================= */
/* ============================================================= */
/* SCENE 1 — THE EVENT HORIZON (circular portal)                   */
/* ============================================================= */

#arrival{
  position:absolute;inset:0;padding:0;
  display:flex;align-items:center;justify-content:center;
}

/* Full-viewport layer hosting all portal rendering. */
.horizon-stage{
  position:fixed;top:0;left:0;width:100vw;height:100vh;
  z-index:1;pointer-events:none;
  display:flex;align-items:center;justify-content:center;
}

/* Canvas for the accretion disk and infall particles — covers full viewport
   so wide-orbit particles don't clip. JS maintains devicePixelRatio-correct
   sizing and handles all rendering. */
.horizon-canvas{
  position:absolute;inset:0;
  display:block;width:100%;height:100%;
}

/* SVG layer for the event horizon core + photon ring. Sits above canvas
   but below content. */
.horizon-svg{
  position:absolute;inset:0;
  width:100%;height:100%;
  pointer-events:none;
  overflow:visible;
}

/* The full portal cluster — the GSAP timeline controls its birth scale.
   Starting state is scale(0); GSAP expands it to 1 during the birth sequence. */
.horizon-core-wrap{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  transform-origin:center center;
  will-change:transform;
}

/* Subtle corona glow around the outer edge of the horizon — pure CSS */
.horizon-corona{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:clamp(380px,44vmin,560px);
  height:clamp(380px,44vmin,560px);
  border-radius:50%;
  background:radial-gradient(circle,
    transparent 38%,
    rgba(157,139,255,0.12) 48%,
    rgba(201,168,76,0.07) 55%,
    transparent 70%);
  pointer-events:none;
  opacity:0;
  mix-blend-mode:screen;
  will-change:opacity;
}

/* Starfield + nebula dim briefly during singularity collapse — reality reacts */
body.horizon-collapsing .nebula,
body.horizon-collapsing .starfield{
  animation:horizon-collapse-react 1.4s ease-in-out forwards;
}
@keyframes horizon-collapse-react{
  0%{opacity:1;filter:brightness(1)}
  40%{opacity:0.25;filter:brightness(0.4)}
  100%{opacity:1;filter:brightness(1)}
}

/* Void blackout — overlays entire viewport during pull-through.
   Starts as a tiny dot at center (matching the horizon), then expands
   outward to consume the page. When scene transition is done, it fades
   away to reveal the next scene. */
.void-blackout{
  position:fixed;top:50%;left:50%;
  width:260px;height:260px;
  transform:translate(-50%,-50%) scale(0);
  border-radius:50%;
  background:radial-gradient(circle,
    #000 0%,
    #020108 60%,
    #050314 85%,
    rgba(5,3,20,0.9) 100%);
  pointer-events:none;
  z-index:9000;
  opacity:1;
  will-change:transform,opacity;
}

/* ===== CONTENT INSIDE THE HORIZON ===== */
.horizon-content{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:5;pointer-events:none;
  width:min(500px,72vw);
  display:flex;flex-direction:column;align-items:center;gap:12px;
  text-align:center;
}
.horizon-content > *{pointer-events:auto}

.arrival-eyebrow{
  font-family:'Cinzel',serif;font-size:11px;letter-spacing:.42em;
  color:rgba(201,168,76,0.78);text-transform:uppercase;
  opacity:0;animation:horizon-content-in 1.2s ease-out forwards 3.8s;
  margin-bottom:14px;
  text-shadow:0 0 18px rgba(201,168,76,0.28);
}

.arrival-title-svg{
  width:clamp(280px,52vw,560px);
  height:auto;
  display:block;
  margin:0 auto;
  opacity:0;
  transform:scale(0.96);
  animation:arrival-title-materialize 1.6s cubic-bezier(0.32,0.72,0.24,1) forwards 4.2s;
}
.arrival-title-halo{
  opacity:0;
  animation:arrival-title-halo-in 1.4s ease-out forwards 4.4s;
}
.arrival-title-face{
  opacity:0;
  animation:arrival-title-face-in 1.6s ease-out forwards 4.55s;
}

@keyframes arrival-title-materialize{
  from{opacity:0;transform:scale(0.96)}
  to{opacity:1;transform:scale(1)}
}
@keyframes arrival-title-halo-in{
  from{opacity:0}
  to{opacity:0.85}
}
@keyframes arrival-title-face-in{
  from{opacity:0}
  to{opacity:1}
}

@keyframes horizon-content-in{
  from{opacity:0;transform:translateY(8px)}
  to{opacity:1;transform:translateY(0)}
}

.cross-btn{
  margin-top:32px;background:transparent;
  border:1px solid rgba(201,168,76,0.5);color:var(--gold);
  font-family:'Cinzel',serif;font-size:12px;font-weight:400;letter-spacing:.35em;
  padding:15px 42px;border-radius:1px;cursor:pointer;text-transform:uppercase;
  transition:all .4s;position:relative;overflow:hidden;
  opacity:0;animation:horizon-content-in 1.2s ease-out forwards 6.0s;
}
.cross-btn:hover{
  border-color:var(--gold);color:#fff;
  box-shadow:0 0 32px rgba(127,119,221,0.4),inset 0 0 20px rgba(127,119,221,0.12);
  letter-spacing:.4em;
}
.cross-btn::before{
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent 0%,rgba(127,119,221,0.25) 50%,transparent 100%);
  transition:left .7s;
}
.cross-btn:hover::before{left:100%}

@media (max-width: 680px){
  .arrival-title-svg{width:min(86vw,440px)}
  .cross-btn{margin-top:24px;padding:14px 36px;font-size:11px}
}





/* ===== DEV PANEL — always-visible reset button (bottom-left) ===== */
.dev-panel{
  position:fixed;bottom:10px;left:10px;z-index:9990;
  display:flex;align-items:center;gap:6px;
  background:rgba(8,8,20,0.75);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(192,57,43,0.35);border-radius:3px;
  padding:5px 8px;
  font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.12em;
  color:rgba(240,236,228,0.4);text-transform:uppercase;
  opacity:0.5;transition:opacity .2s;
}
.dev-panel:hover{opacity:1}
.dev-panel-label{color:rgba(192,57,43,0.75)}
.dev-reset-btn{
  background:transparent;border:1px solid rgba(192,57,43,0.5);
  color:rgba(240,236,228,0.65);
  font-family:'DM Sans',sans-serif;font-size:9px;letter-spacing:.12em;
  padding:4px 10px;border-radius:2px;cursor:pointer;text-transform:uppercase;
  transition:all .2s;
}
.dev-reset-btn:hover{
  background:rgba(192,57,43,0.15);color:#f0ece4;border-color:rgba(192,57,43,0.8);
}

.fade-in{animation:fade-in-anim .9s ease forwards}
@keyframes fade-in-anim{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

</style>
</head>
<body>

<div class="nebula"></div>

<!-- Hidden defs SVG — iridescent void substance gradients and filters
     for the EVERMARK arrival title. Same family as Atheneum welcome. -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="threshold-iridescent-fill" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a2a78">
        <animate attributeName="stop-color"
          values="#3a2a78; #4a2a88; #2a1a68; #3a2a78"
          dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="22%" stop-color="#7f77dd">
        <animate attributeName="stop-color"
          values="#7f77dd; #9586e8; #6c63c8; #7f77dd"
          dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#e8def8">
        <animate attributeName="stop-color"
          values="#e8def8; #f4eaff; #d8c8f0; #e8def8"
          dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="78%" stop-color="#7f77dd">
        <animate attributeName="stop-color"
          values="#7f77dd; #6c63c8; #9586e8; #7f77dd"
          dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#3a2a78">
        <animate attributeName="stop-color"
          values="#3a2a78; #2a1a68; #4a2a88; #3a2a78"
          dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="threshold-void-halo" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur1"/>
      <feFlood flood-color="#7f77dd" flood-opacity="0.55"/>
      <feComposite in2="blur1" operator="in" result="halo1"/>
      <feGaussianBlur in="SourceAlpha" stdDeviation="11" result="blur2"/>
      <feFlood flood-color="#5a4ea8" flood-opacity="0.35"/>
      <feComposite in2="blur2" operator="in" result="halo2"/>
      <feMerge>
        <feMergeNode in="halo2"/>
        <feMergeNode in="halo1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="threshold-iridescent-surface" x="-10%" y="-20%" width="120%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.012 0.025" numOctaves="2" seed="5" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="1.2" xChannelSelector="R" yChannelSelector="G" result="displaced"/>
      <feGaussianBlur in="displaced" stdDeviation="0.3" result="softened"/>
      <feMerge><feMergeNode in="softened"/></feMerge>
    </filter>
  </defs>
</svg>

<script>
// ========= STARFIELD =========
(function makeStars(){
  var field = document.getElementById('starfield');
  if(!field) return;
  var count = 80;
  for(var i=0;i<count;i++){
    var s = document.createElement('div');
    s.className = 'star';
    var size = Math.random()*1.8 + 0.3;
    s.style.width = size+'px';
    s.style.height = size+'px';
    s.style.left = Math.random()*100+'%';
    s.style.top = Math.random()*100+'%';
    s.style.animationDelay = (Math.random()*4)+'s';
    s.style.animationDuration = (3+Math.random()*4)+'s';
    field.appendChild(s);
  }
})();

// ========= EVENT HORIZON SYSTEM =========
// Everything below is the portal's visual runtime:
//   - Custom canvas renderer (accretion disk + infall events)
//   - GSAP birth sequence timeline
//   - GSAP idle animations (photon ring pulse, subtle horizon breathing)
//   - GSAP interaction layer (hover accelerates disk, click triggers pull-through)
// Each layer checks for gsap / canvas availability and fails gracefully if
// something's not there.

// Order matters: HORIZON_STATE and all helper functions are declared first,
// then `initEventHorizon` is called via DOMContentLoaded. Original bug was
// running this IIFE at script-eval time before `var HORIZON_STATE = {...}`
// had been initialized.

function initEventHorizon(){
  console.log('[Threshold] Event Horizon init. GSAP:', typeof gsap);

  // Sync model: read the canonical journey flag. The user is "returning"
  // on threshold if and only if they've completed the full threshold→dive→
  // atheneum welcome+tutorial journey. Pre-tutorial-Begin, they're still
  // first-time on every page in the chain. sync_threshold_atheneum brief.
  var isReturning = false;
  try { isReturning = localStorage.getItem('ga_journey_v1') === '1'; } catch(e){}

  // Kick off the canvas renderer immediately; disk particles will begin
  // orbiting empty space until the horizon materializes. The birth timeline
  // handles the visual "reveal" choreography on top.
  startCanvasRenderer();

  if(isReturning){
    // Skip birth — set everything to its resting state immediately
    skipBirthSequence();
  } else {
    // Full cinematic birth
    playBirthSequence();
  }

  // Idle animations + hover/click — always active
  startIdleAnimations();
  hookButtonReactions();

  // Journey flag is NOT set here — that's atheneum's tutorial Begin click.
  // Threshold marks nothing; the canonical flag lives in atheneum. sync brief.
}

// ============================================================================
// CANVAS RENDERER
// ============================================================================
// Renders two particle systems on a single canvas:
//   - Accretion disk: a continuous field of orbital particles around the
//     center, with Keplerian-ish motion (inner particles faster than outer).
//   - Infall events: occasional particles that spiral INTO the horizon,
//     triggering a brightness flash on consumption.
// Both systems share the canvas and draw loop for efficiency.

var HORIZON_STATE = {
  canvas: null,
  ctx: null,
  width: 0,
  height: 0,
  dpr: 1,
  centerX: 0,
  centerY: 0,
  horizonRadius: 130,       // matches SVG horizon circle r=130 in viewBox coords
  diskInnerRadius: 140,     // particles start just outside photon ring
  diskOuterRadius: 420,     // outer edge of visible disk
  rotationSpeed: 1,         // multiplier — 1 is normal, 2 during hover
  timeScale: 1,             // global time multiplier — 1 normal, spikes during pull
  particles: [],
  infallParticles: [],
  flashIntensity: 0,        // 0-1; spikes when matter falls in
  coreOpacity: 1,           // scales with birth state; 0 before horizon exists
  rafId: null,
  lastInfallAt: 0,
  lastOutburstAt: 0,
  birthComplete: false,
  pullThroughActive: false
};

function startCanvasRenderer(){
  var canvas = document.getElementById('horizonCanvas');
  if(!canvas){ console.warn('[Threshold] No horizonCanvas found'); return; }

  HORIZON_STATE.canvas = canvas;
  HORIZON_STATE.ctx = canvas.getContext('2d');

  sizeCanvas();
  window.addEventListener('resize', sizeCanvas);

  // Seed the disk with particles — all orbits initialized with random phase
  for(var i = 0; i < 180; i++){
    HORIZON_STATE.particles.push(createDiskParticle());
  }

  // Start the draw loop
  HORIZON_STATE.rafId = requestAnimationFrame(drawFrame);

  console.log('[Threshold] Canvas renderer started. Particles:', HORIZON_STATE.particles.length);
}

function sizeCanvas(){
  var c = HORIZON_STATE.canvas;
  if(!c) return;
  HORIZON_STATE.dpr = window.devicePixelRatio || 1;
  var w = window.innerWidth;
  var h = window.innerHeight;
  c.width  = Math.floor(w * HORIZON_STATE.dpr);
  c.height = Math.floor(h * HORIZON_STATE.dpr);
  c.style.width  = w + 'px';
  c.style.height = h + 'px';
  HORIZON_STATE.ctx.setTransform(HORIZON_STATE.dpr, 0, 0, HORIZON_STATE.dpr, 0, 0);
  HORIZON_STATE.width  = w;
  HORIZON_STATE.height = h;
  HORIZON_STATE.centerX = w / 2;
  HORIZON_STATE.centerY = h / 2;
}

// Create one disk particle with a random orbit and phase.
// The orbital radius determines its speed (inner = faster), simulating
// Keplerian motion in a simplified form.
// Base velocity is tuned so inner particles complete a full orbit in ~15s
// and outer particles take ~40s — slow, cinematic, still feels alive.
function createDiskParticle(){
  var r = HORIZON_STATE.diskInnerRadius + Math.random() * (HORIZON_STATE.diskOuterRadius - HORIZON_STATE.diskInnerRadius);
  var innerFraction = (r - HORIZON_STATE.diskInnerRadius) / (HORIZON_STATE.diskOuterRadius - HORIZON_STATE.diskInnerRadius);
  // Angular velocity scales inversely with sqrt(r). At the inner edge, a full
  // orbit takes ~15s. 2π rad / (15s × 60fps) ≈ 0.007 rad/frame at inner edge.
  var baseAngVel = 0.007 / Math.sqrt(r / HORIZON_STATE.diskInnerRadius);
  var colorRoll = Math.random();
  // Color grading: inner disk hotter (white/gold), outer cooler (gold/violet)
  var color;
  if(innerFraction < 0.2){
    color = Math.random() < 0.5 ? '#fff7dd' : '#f5eecc';
  } else if(innerFraction < 0.55){
    color = Math.random() < 0.6 ? '#f5eecc' : '#e5c574';
  } else {
    color = colorRoll < 0.4 ? '#e5c574' : (colorRoll < 0.75 ? '#c9a84c' : '#9d8bff');
  }
  return {
    r: r,
    baseR: r,
    angle: Math.random() * Math.PI * 2,
    angVel: baseAngVel * (0.8 + Math.random() * 0.4),
    size: 0.6 + Math.random() * 1.6 + (1 - innerFraction) * 0.3,
    // Vertical flatten factor — makes the disk elliptical (viewed at slight angle)
    // 1 = perfect circle; < 1 = flattened top-to-bottom
    flatten: 0.78 + Math.random() * 0.08,
    opacity: 0.4 + Math.random() * 0.55,
    color: color,
    // Wobble so particles don't orbit perfectly — slight radial oscillation
    wobblePhase: Math.random() * Math.PI * 2,
    wobbleAmp: 1 + Math.random() * 3,
    wobbleSpeed: 0.02 + Math.random() * 0.03
  };
}

// Create an infall event: a particle that spirals from the outer edge into
// the horizon, then triggers a consumption flash on crossing the photon ring.
function createInfallParticle(){
  var startR = HORIZON_STATE.diskOuterRadius + 40 + Math.random() * 80;
  return {
    r: startR,
    angle: Math.random() * Math.PI * 2,
    angVel: 0.018 + Math.random() * 0.012,
    inwardSpeed: 0.65 + Math.random() * 0.4,  // r units per frame (scales with dt)
    accel: 1.012,  // each frame, inwardSpeed multiplies by this (gravity accelerating)
    size: 1.4 + Math.random() * 1.2,
    color: Math.random() < 0.7 ? '#f5eecc' : '#e5c574',
    opacity: 0.9,
    consumed: false,
    trail: []  // array of {x, y} past positions for motion trail
  };
}

// Main draw loop — called every frame via requestAnimationFrame
var lastFrameTime = 0;
function drawFrame(now){
  // On the very first frame, lastFrameTime is 0 but `now` can be thousands
  // of ms — don't let that enormous delta drive physics or everything jumps.
  if(lastFrameTime === 0){ lastFrameTime = now; HORIZON_STATE.rafId = requestAnimationFrame(drawFrame); return; }
  var dt = Math.min(32, now - lastFrameTime) / 16.67;  // normalized to 60fps
  lastFrameTime = now;
  dt *= HORIZON_STATE.timeScale;

  var ctx = HORIZON_STATE.ctx;
  var cx = HORIZON_STATE.centerX;
  var cy = HORIZON_STATE.centerY;

  // Clear canvas each frame (transparent — starfield shows through)
  ctx.clearRect(0, 0, HORIZON_STATE.width, HORIZON_STATE.height);

  // --- ACCRETION DISK ---
  ctx.globalCompositeOperation = 'screen';  // additive blending = brighter overlaps

  for(var i = 0; i < HORIZON_STATE.particles.length; i++){
    var p = HORIZON_STATE.particles[i];
    // Advance orbit
    p.angle += p.angVel * HORIZON_STATE.rotationSpeed * dt;
    p.wobblePhase += p.wobbleSpeed * dt;
    var currentR = p.baseR + Math.sin(p.wobblePhase) * p.wobbleAmp;

    // Elliptical projection — looks like disk viewed at slight angle
    var x = cx + Math.cos(p.angle) * currentR;
    var y = cy + Math.sin(p.angle) * currentR * p.flatten;

    // Fade particles that are "behind" the black hole (slightly lower opacity
    // when on the far side of the orbit, simulating light not making it around)
    var depthFactor = 0.7 + 0.3 * (Math.sin(p.angle) * p.flatten > 0 ? 1 : 0.6);

    // Particles very near inner edge glow brighter (hottest part of disk)
    var innerGlow = currentR < HORIZON_STATE.diskInnerRadius + 30 ? 1.4 : 1;

    drawGlowPoint(ctx, x, y, p.size * innerGlow, p.opacity * depthFactor * HORIZON_STATE.coreOpacity, p.color);
  }

  // --- INFALL PARTICLES ---
  for(var j = HORIZON_STATE.infallParticles.length - 1; j >= 0; j--){
    var ip = HORIZON_STATE.infallParticles[j];
    ip.angle += ip.angVel * dt;
    ip.r -= ip.inwardSpeed * dt;
    ip.inwardSpeed *= Math.pow(ip.accel, dt);

    var ix = cx + Math.cos(ip.angle) * ip.r;
    var iy = cy + Math.sin(ip.angle) * ip.r * 0.82;

    // Add to trail
    ip.trail.push({x: ix, y: iy, opacity: ip.opacity});
    if(ip.trail.length > 14) ip.trail.shift();

    // Draw trail
    for(var t = 0; t < ip.trail.length; t++){
      var trailAlpha = (t / ip.trail.length) * ip.trail[t].opacity * 0.6;
      drawGlowPoint(ctx, ip.trail[t].x, ip.trail[t].y, ip.size * (t / ip.trail.length) * 0.9, trailAlpha, ip.color);
    }

    // Draw head
    drawGlowPoint(ctx, ix, iy, ip.size, ip.opacity, ip.color);

    // Crossing the photon ring = consumption
    if(ip.r < HORIZON_STATE.horizonRadius + 6 && !ip.consumed){
      ip.consumed = true;
      HORIZON_STATE.flashIntensity = Math.min(1, HORIZON_STATE.flashIntensity + 0.55);
    }

    // Remove once fully inside the horizon
    if(ip.r < HORIZON_STATE.horizonRadius - 20){
      HORIZON_STATE.infallParticles.splice(j, 1);
    }
  }

  // --- CONSUMPTION FLASH ---
  if(HORIZON_STATE.flashIntensity > 0.01){
    var flashR = HORIZON_STATE.horizonRadius + 20;
    var grad = ctx.createRadialGradient(cx, cy, HORIZON_STATE.horizonRadius, cx, cy, flashR + 40);
    grad.addColorStop(0, 'rgba(255, 247, 221, ' + (HORIZON_STATE.flashIntensity * 0.7) + ')');
    grad.addColorStop(0.6, 'rgba(201, 168, 76, ' + (HORIZON_STATE.flashIntensity * 0.35) + ')');
    grad.addColorStop(1, 'rgba(157, 139, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, flashR + 40, 0, Math.PI * 2);
    ctx.fill();
    HORIZON_STATE.flashIntensity *= Math.pow(0.94, dt);
  }

  ctx.globalCompositeOperation = 'source-over';

  // --- INFALL TIMING ---
  if(HORIZON_STATE.birthComplete && !HORIZON_STATE.pullThroughActive){
    var infallInterval = HORIZON_STATE.rotationSpeed > 1.5 ? 1500 : 4500;
    if(now - HORIZON_STATE.lastInfallAt > infallInterval && Math.random() < 0.02){
      HORIZON_STATE.infallParticles.push(createInfallParticle());
      HORIZON_STATE.lastInfallAt = now;
    }
  }

  HORIZON_STATE.rafId = requestAnimationFrame(drawFrame);
}

// Helper: draw a soft glowing circle at a point. Uses a small radial gradient
// rather than a hard circle so particles look like light sources, not pixels.
function drawGlowPoint(ctx, x, y, size, opacity, color){
  if(opacity <= 0.02 || size <= 0.05) return;
  // Parse color into r,g,b once (quick hex parse)
  var hex = color;
  if(hex[0] === '#') hex = hex.slice(1);
  var r = parseInt(hex.substr(0, 2), 16);
  var g = parseInt(hex.substr(2, 2), 16);
  var b = parseInt(hex.substr(4, 2), 16);
  var grad = ctx.createRadialGradient(x, y, 0, x, y, size * 3);
  grad.addColorStop(0, 'rgba(' + r + ',' + g + ',' + b + ',' + opacity + ')');
  grad.addColorStop(0.4, 'rgba(' + r + ',' + g + ',' + b + ',' + (opacity * 0.5) + ')');
  grad.addColorStop(1, 'rgba(' + r + ',' + g + ',' + b + ',0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(x, y, size * 3, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================================
// BIRTH SEQUENCE (GSAP)

function playBirthSequence(){
  if(typeof gsap === 'undefined'){ skipBirthSequence(); return; }

  var coreWrap = document.getElementById('horizonCoreWrap');
  var corona   = document.getElementById('horizonCorona');
  var photonRing = document.getElementById('photonRing');
  var photonInner = document.getElementById('photonRingInner');
  var horizonCore = document.getElementById('horizonCore');

  // Start states — everything hidden / minimal
  gsap.set(coreWrap, { scale: 0, opacity: 1 });
  if(corona) gsap.set(corona, { opacity: 0, scale: 0.6 });
  if(photonRing) gsap.set(photonRing, { opacity: 0, scale: 0.3, transformOrigin: 'center center' });
  if(photonInner) gsap.set(photonInner, { opacity: 0, scale: 0.3, transformOrigin: 'center center' });
  if(horizonCore) gsap.set(horizonCore, { opacity: 0, scale: 0.3, transformOrigin: 'center center' });

  // Canvas starts hidden during collapse (disk hasn't formed yet)
  HORIZON_STATE.coreOpacity = 0;

  var tl = gsap.timeline();

  // Beat 1: 0.0s — 0.3s — dark page, nothing happens. Then a point ignites.
  tl.set({}, {}, 0.3);
  // (We use a small SVG circle that briefly appears as the pre-singularity point)

  // Beat 2: 0.6s — The point COLLAPSES (starfield darkens via CSS class)
  tl.call(function(){
    document.body.classList.add('horizon-collapsing');
    setTimeout(function(){ document.body.classList.remove('horizon-collapsing'); }, 1500);
  }, null, 0.6);

  // Beat 3: 1.2s — Event horizon punches into existence (scale 0.3 → 1, fast)
  tl.to(horizonCore, {
    scale: 1,
    opacity: 1,
    duration: 0.4,
    ease: 'power3.out'
  }, 1.2);

  // Beat 4: 1.4s — Photon rings ignite, pulse bright then settle
  tl.to([photonRing, photonInner], {
    scale: 1,
    opacity: 1,
    duration: 0.5,
    ease: 'back.out(1.3)'
  }, 1.4);

  // Beat 5: 1.8s — Core wrap itself comes up to scale 1 (if any other offset)
  tl.to(coreWrap, {
    scale: 1,
    duration: 0.8,
    ease: 'power2.out'
  }, 1.8);

  // Beat 6: 2.0s — Accretion disk materializes (fade in via coreOpacity)
  tl.to(HORIZON_STATE, {
    coreOpacity: 1,
    duration: 1.5,
    ease: 'power2.out'
  }, 2.0);

  // Beat 7: 2.8s — Corona glow fades in
  tl.to(corona, {
    opacity: 1,
    scale: 1,
    duration: 1.2,
    ease: 'power2.out'
  }, 2.8);

  // Beat 8: 3.5s — Birth done, idle animations take over
  tl.call(function(){
    HORIZON_STATE.birthComplete = true;
    console.log('[Threshold] Birth sequence complete.');
  }, null, 3.5);
}

function skipBirthSequence(){
  // Returning visitor: snap everything to its steady state instantly
  var coreWrap = document.getElementById('horizonCoreWrap');
  var corona = document.getElementById('horizonCorona');
  if(typeof gsap !== 'undefined'){
    gsap.set(coreWrap, { scale: 1, opacity: 1 });
    gsap.set(corona, { opacity: 1, scale: 1 });
  } else {
    if(coreWrap) coreWrap.style.transform = 'translate(-50%,-50%) scale(1)';
    if(corona) corona.style.opacity = '1';
  }
  HORIZON_STATE.coreOpacity = 1;
  HORIZON_STATE.birthComplete = true;
}

var idleTimeline = null;

function startIdleAnimations(){
  if(typeof gsap === 'undefined') return;
  var photonRing = document.getElementById('photonRing');
  var corona = document.getElementById('horizonCorona');
  if(!photonRing) return;

  idleTimeline = gsap.timeline({ repeat: -1 });

  // Photon ring subtle pulse — 4 second cycle
  idleTimeline.to(photonRing, {
    opacity: 0.85,
    duration: 2,
    ease: 'sine.inOut'
  }, 0);
  idleTimeline.to(photonRing, {
    opacity: 1,
    duration: 2,
    ease: 'sine.inOut'
  }, 2);

  // Corona breathes in parallel — slightly different rhythm for organic feel
  if(corona){
    idleTimeline.to(corona, {
      opacity: 0.75,
      duration: 2.5,
      ease: 'sine.inOut'
    }, 0.3);
    idleTimeline.to(corona, {
      opacity: 1,
      duration: 2.5,
      ease: 'sine.inOut'
    }, 2.8);
  }
}

// ============================================================================
// BUTTON REACTIONS (hover accelerates, click triggers pull-through)
// ============================================================================

function hookButtonReactions(){
  // IMPORTANT: we used to early-return if GSAP was undefined, but that meant
  // the button kept its inline onclick="showTutorial()" — which is the OLD
  // path. When GSAP fails to load (slow network, ad blocker, CDN blip), the
  // button would silently route users through the tutorial/dialogue/realms
  // sequence instead of the dive. Now we always poll + wire. GSAP is only
  // needed for hover visual effects, which wireButton handles gracefully
  // when gsap is undefined.
  var tries = 0;
  var pollId = setInterval(function(){
    var btn = document.querySelector('.cross-btn');
    if(btn){
      clearInterval(pollId);
      wireButton(btn);
    } else if(++tries > 30){
      clearInterval(pollId);
    }
  }, 150);
}

function wireButton(btn){
  var hasGSAP = typeof gsap !== 'undefined';
  var photonRing = document.getElementById('photonRing');
  var corona = document.getElementById('horizonCorona');

  btn.addEventListener('mouseenter', function(){
    if(!hasGSAP) return;
    // Disk spins faster, photon ring brightens
    gsap.to(HORIZON_STATE, {
      rotationSpeed: 2.2,
      duration: 0.6,
      ease: 'power2.out'
    });
    if(photonRing){
      gsap.to(photonRing, {
        opacity: 1.15,
        duration: 0.5,
        ease: 'power2.out'
      });
    }
    if(corona){
      gsap.to(corona, {
        opacity: 1.2,
        duration: 0.5,
        ease: 'power2.out'
      });
    }
  });

  btn.addEventListener('mouseleave', function(){
    if(!hasGSAP) return;
    gsap.to(HORIZON_STATE, {
      rotationSpeed: 1,
      duration: 0.9,
      ease: 'power2.out'
    });
    if(photonRing){
      gsap.to(photonRing, {
        opacity: 1,
        duration: 0.9,
        ease: 'power2.out'
      });
    }
    if(corona){
      gsap.to(corona, {
        opacity: 1,
        duration: 0.9,
        ease: 'power2.out'
      });
    }
  });

  // Click — always dives to Atheneum regardless of visit state.
  btn.removeAttribute('onclick');
  btn.addEventListener('click', function(){
    triggerPullThroughToAtheneum();
  });
}

function triggerPullThrough(callback){
  if(typeof gsap === 'undefined'){ callback(); return; }
  HORIZON_STATE.pullThroughActive = true;

  var content = document.querySelector('.horizon-content');
  var coreWrap = document.getElementById('horizonCoreWrap');
  var corona = document.getElementById('horizonCorona');
  var blackout = document.getElementById('voidBlackout');
  var stage = document.querySelector('.stage');

  // Pause idle animations so they don't fight the timeline
  if(idleTimeline) idleTimeline.pause();

  // Blackout starts as a tiny dot, invisible until we scale it in.
  // We don't touch its opacity here — it's set to 1 in CSS so only the scale
  // transform controls visibility. Start it at scale 0 fresh.
  gsap.set(blackout, { scale: 0, opacity: 1 });

  var tl = gsap.timeline({
    onComplete: function(){
      HORIZON_STATE.pullThroughActive = false;
      callback();
    }
  });

  // =========== BEAT 1 (0.0 to 0.4s): LEAN IN ===========
  // Content dims and scales down slightly. Gravitational time dilation metaphor —
  // disk actually SLOWS as we approach the horizon. Creates anticipation.
  tl.to(content, {
    opacity: 0,
    scale: 0.92,
    duration: 0.45,
    ease: 'power2.in'
  }, 0);

  tl.to(HORIZON_STATE, {
    rotationSpeed: 0.4,  // slow down, not speed up — time is dilating
    duration: 0.4,
    ease: 'power2.out'
  }, 0);

  // =========== BEAT 2 (0.4s to 1.2s): THE DIVE ===========
  // Horizon grows — we're flying INTO it. Corona expands in kind. Blackout
  // scales from 0 to covering the full viewport. Disk accelerates inward
  // (matter being pulled in alongside us).
  tl.to(coreWrap, {
    scale: 3.2,
    duration: 0.85,
    ease: 'power2.in'
  }, 0.4);

  tl.to(corona, {
    scale: 2.4,
    opacity: 0.4,
    duration: 0.85,
    ease: 'power2.in'
  }, 0.4);

  // Blackout grows from center — uses scale rather than width/height so it's
  // smooth and GPU-accelerated. 12x scale ensures it covers any viewport since
  // CSS base is 260px and max viewport diagonal is ~2500px.
  tl.to(blackout, {
    scale: 12,
    duration: 1.0,
    ease: 'power2.in'
  }, 0.5);

  // Accelerate disk subtly during the dive — we're moving through the disk
  tl.to(HORIZON_STATE, {
    rotationSpeed: 2,
    duration: 0.7,
    ease: 'power2.in'
  }, 0.5);

  // =========== BEAT 3 (1.4s to 1.9s): SWALLOWED ===========
  // Blackout fully covers screen. Brief held darkness. The canvas rendering
  // is now hidden beneath the blackout. Scene transition fires during this
  // beat so it's invisible to the user.
  tl.call(function(){
    // Snap scene transition inside the darkness
    var prev = document.getElementById('arrival');
    var next = document.getElementById('tutorial');
    if(prev && next){
      prev.classList.remove('active');
      next.classList.add('active');
      // CRITICAL: keep currentScene in sync. Otherwise the next showScene
      // call (e.g. tutorial → dialogue) thinks we're still on arrival,
      // tries to hide arrival (already hidden), and leaves tutorial visible
      // underneath the new scene — resulting in overlapping scenes.
      currentScene = 'tutorial';
    }
  }, null, 1.5);

  // =========== BEAT 4 (1.9s to 3.0s): EMERGE ===========
  // Blackout fades away, revealing the tutorial. Smooth, slow. Feels like
  // emerging from a long fall.
  tl.to(blackout, {
    opacity: 0,
    duration: 1.1,
    ease: 'power2.out'
  }, 1.9);

  // =========== BEAT 5 (3.0s): RESET ===========
  // Reset horizon elements so if the user navigates back, everything is in
  // a sane state. Blackout returns to scale 0 (invisible pebble).
  tl.call(function(){
    gsap.set(content, { scale: 1, opacity: 1 });
    gsap.set(coreWrap, { scale: 1 });
    gsap.set(corona, { scale: 1, opacity: 1 });
    gsap.set(blackout, { scale: 0, opacity: 1 });
    HORIZON_STATE.rotationSpeed = 1;
    if(idleTimeline) idleTimeline.resume();
  }, null, 3.0);
}

// ============================================================================
// Cinematic pull-through from the Threshold to the Atheneum.
// Always navigates to /atheneum.html?dive=1 — atheneum.html decides
// whether to honor the dive based on ga_journey_v1 (returning users skip it).
//
// Handoff contract:
//   - At 1.5s (peak darkness), navigate to /atheneum.html?dive=1
//   - atheneum.html detects the query param, renders a full-screen black
//     overlay immediately, then runs its zoom-in-and-reveal timeline
//   - The visual state at navigation (fully black screen) matches atheneum's
//     initial dive state, so the page swap is invisible to the user
function triggerPullThroughToAtheneum(){
  if(typeof gsap === 'undefined'){
    window.location.href = '/atheneum.html?dive=1';
    return;
  }
  HORIZON_STATE.pullThroughActive = true;

  var content = document.querySelector('.horizon-content');
  var coreWrap = document.getElementById('horizonCoreWrap');
  var corona = document.getElementById('horizonCorona');
  var blackout = document.getElementById('voidBlackout');

  if(idleTimeline) idleTimeline.pause();
  gsap.set(blackout, { scale: 0, opacity: 1 });

  var tl = gsap.timeline();

  // BEAT 1 (0.0 to 0.45s): LEAN IN — content dims, disk slows (time dilation)
  tl.to(content, { opacity: 0, scale: 0.92, duration: 0.45, ease: 'power2.in' }, 0);
  tl.to(HORIZON_STATE, { rotationSpeed: 0.4, duration: 0.4, ease: 'power2.out' }, 0);

  // BEAT 2 (0.4s to 1.4s): THE DIVE — horizon grows, blackout covers, disk accelerates
  tl.to(coreWrap, { scale: 3.2, duration: 0.95, ease: 'power2.in' }, 0.4);
  tl.to(corona, { scale: 2.4, opacity: 0.4, duration: 0.95, ease: 'power2.in' }, 0.4);
  tl.to(blackout, { scale: 12, duration: 1.1, ease: 'power2.in' }, 0.5);
  tl.to(HORIZON_STATE, { rotationSpeed: 2, duration: 0.8, ease: 'power2.in' }, 0.5);

  // BEAT 3 (1.5s): NAVIGATE — the blackout is now full-screen. Navigate to
  // pregame.html. The browser's page-swap happens under the darkness; the
  // new page will render its own black overlay immediately so the darkness
  // appears continuous.
  tl.call(function(){
    window.location.href = '/atheneum.html?dive=1';
  }, null, 1.5);
}

function crossThresholdToAtheneum(){
  triggerPullThroughToAtheneum();
}

function showScene(id){
  var prev = document.getElementById(currentScene);

  prev.classList.add('exiting');

      playSentinelEntrance();

// ========= SENTINEL MARK ANIMATIONS (archived — scene removed) =========
var stylesInjectedAt = Date.now();
var ORBITALS = [];

function getShapePosition(orbitalIndex){ if(!ORBITALS.length) return {x:0,y:0};
  var elapsed = Date.now() - stylesInjectedAt;
  var orb = ORBITALS[orbitalIndex];
  var angleRad = orb.dir * (elapsed / orb.period) * 2 * Math.PI;
  return {
    x: 200 + orb.radius * Math.cos(angleRad),
    y: 200 + orb.radius * Math.sin(angleRad)
  };
}

function isDialogueVisible(){
  return currentScene === 'dialogue';
}

function fireParticle(idx, opts){
  opts = opts || {};
  var particleLayer = document.getElementById('smParticles');
  var pupil = document.getElementById('smPupil');
  if(!particleLayer || !pupil) return;
  if(idx < 0 || idx >= ORBITALS.length) return;

  var startPos = getShapePosition(idx);
  var sourceShape = document.querySelector('.sm-orbit-' + (idx + 1) + ' .sm-shape');
  if(sourceShape){
    sourceShape.classList.remove('giving');
    void sourceShape.offsetWidth;
    sourceShape.classList.add('giving');
    setTimeout(function(){ if(sourceShape) sourceShape.classList.remove('giving'); }, 1600);
  }

  var svgNS = 'http://www.w3.org/2000/svg';
  var particle = document.createElementNS(svgNS, 'circle');
  particle.setAttribute('class', 'sm-particle');
  particle.setAttribute('cx', startPos.x);
  particle.setAttribute('cy', startPos.y);
  particle.setAttribute('r', opts.startR || 2);
  particle.setAttribute('fill', 'url(#particleGrad)');
  particle.setAttribute('opacity', 0);
  particleLayer.appendChild(particle);

  var duration = 1800;
  var start = performance.now();
  var isBurst = !!opts.isBurst;

  function animate(now){
    var elapsed = now - start;
    var t = Math.min(elapsed / duration, 1);
    var eased = t * t;
    var cx = startPos.x + (200 - startPos.x) * eased;
    var cy = startPos.y + (200 - startPos.y) * eased;
    particle.setAttribute('cx', cx);
    particle.setAttribute('cy', cy);
    var op;
    if(t < 0.15) op = t / 0.15 * 0.9;
    else if(t < 0.85) op = 0.9 + (t - 0.15) / 0.7 * 0.1;
    else op = 1;
    particle.setAttribute('opacity', op);
    particle.setAttribute('r', (opts.startR || 2) + t * 2);

    if(t < 1){
      requestAnimationFrame(animate);
    } else {
      if(!isBurst){
        pupil.classList.remove('absorbing');
        void pupil.offsetWidth;
        pupil.classList.add('absorbing');
        setTimeout(function(){ if(pupil) pupil.classList.remove('absorbing'); }, 500);
      }
      if(particle) particle.remove();
    }
  }
  requestAnimationFrame(animate);
}

function fireSingle(){
  fireParticle(Math.floor(Math.random() * ORBITALS.length));
}
function fireMiniBurst(){
  var indices = [0,1,2,3,4].sort(function(){ return Math.random() - 0.5; }).slice(0, 3);
  indices.forEach(function(idx, i){ setTimeout(function(){ fireParticle(idx, { isBurst: true }); }, i * 120); });
  setTimeout(triggerBigAbsorb, 1800 + 240);
}
function fireFullBurst(){
  for(var i = 0; i < ORBITALS.length; i++){
    (function(idx){ setTimeout(function(){ fireParticle(idx, { isBurst: true, startR: 2.5 }); }, idx * 60); })(i);
  }
  setTimeout(triggerBigAbsorb, 1800 + 300);
}
function triggerBigAbsorb(){
  var pupil = document.getElementById('smPupil');
  if(!pupil) return;
  pupil.classList.remove('absorbing');
  pupil.classList.remove('big-absorbing');
  void pupil.offsetWidth;
  pupil.classList.add('big-absorbing');
  setTimeout(function(){ if(pupil) pupil.classList.remove('big-absorbing'); }, 900);
}

  function buildPathsSVG(){
    if(!CHAMBER_PATHS.length) return '<svg class="atlas-paths"></svg>';
    var lookup = {};

    var paths = CHAMBER_PATHS.map(function(p){
      var a = lookup[p.from], b = lookup[p.to];
      if(!a || !b) return '';
      var midX = (a.x + b.x) / 2;
      var midY = (a.y + b.y) / 2 + 4;
      return '<path d="M ' + a.x + ' ' + a.y + ' Q ' + midX + ' ' + midY + ' ' + b.x + ' ' + b.y + '" ' +

  function buildAnnotationStage(){
    return '<div class="atlas-annotation-stage"></div>';

  var annotationSchedulerStarted = false;
  var annotationSchedulerTimeout = null;
  var lastNoteIndex = -1;

  function startAnnotationScheduler(){
    if(annotationSchedulerStarted) return;
    annotationSchedulerStarted = true;
    annotationSchedulerTimeout = setTimeout(function(){
      fireAnnotation();
      scheduleNextAnnotation();
    }, 2500);
  }

  function stopAnnotationScheduler(){
    annotationSchedulerStarted = false;
    if(annotationSchedulerTimeout){
      clearTimeout(annotationSchedulerTimeout);
      annotationSchedulerTimeout = null;
    }
  }

  function scheduleNextAnnotation(){
    if(!annotationSchedulerStarted) return;
    var delay = 10000 + Math.random() * 8000;
    annotationSchedulerTimeout = setTimeout(function(){
      fireAnnotation();
      scheduleNextAnnotation();
    }, delay);
  }

  function isContextValid(context){
    if(context === 'always') return true;
    if(context === 'arcanium-sealed'){
      var a = CHAMBERS.find(function(c){ return c.id === 'arcanium'; });
      return a && a.status === 'sealed';
    }
    if(context === 'scriptorium-sealed'){
      var s = CHAMBERS.find(function(c){ return c.id === 'scriptorium'; });
      return s && s.status === 'sealed';
    }
    if(context === 'agora-sealed'){
      var ag = CHAMBERS.find(function(c){ return c.id === 'agora'; });
      return ag && ag.status === 'sealed';
    }
    return true;
  }

  function fireAnnotation(){
    if(!overlayEl || !overlayEl.classList.contains('active')) return;
    var stage = overlayEl.querySelector('.atlas-annotation-stage');
    if(!stage) return;
    var validNotes = MAKERS_NOTES.filter(function(note, i){
      return isContextValid(note.context) && i !== lastNoteIndex;
    });
    if(validNotes.length === 0) return;
    var note = validNotes[Math.floor(Math.random() * validNotes.length)];
    lastNoteIndex = MAKERS_NOTES.indexOf(note);
    spawnAnnotation(stage, note);
  }

  function spawnAnnotation(stage, note){
    var el = document.createElement('div');
    el.className = 'atlas-annotation';
    el.style.left = note.x + '%';
    el.style.top = note.y + '%';
    el.textContent = '';
    var rotation = (Math.random() - 0.5) * 4;
    el.style.transform = 'translateY(-50%) rotate(' + rotation + 'deg)';
    stage.appendChild(el);
    var i = 0;
    var typeInterval = setInterval(function(){
      if(i < note.text.length){
        el.textContent = note.text.substring(0, i + 1);
        i++;
      } else {
        clearInterval(typeInterval);
        setTimeout(function(){
          el.classList.add('atlas-annotation-fading');
          setTimeout(function(){
            if(el.parentNode) el.parentNode.removeChild(el);
          }, 2200);
        }, 5000);
      }
    }, 55);
  }

  function openAtlas(){
    buildOverlay();
    isOpen = true;
    triggerBtn.classList.add('open');
    overlayEl.setAttribute('aria-hidden','false');
    void overlayEl.offsetWidth;
    overlayEl.classList.add('active');
    startAnnotationScheduler();
  }

  function closeAtlas(){
    isOpen = false;
    triggerBtn.classList.remove('open');
    if(overlayEl){
      overlayEl.classList.remove('active');
      overlayEl.setAttribute('aria-hidden','true');
    }
    stopAnnotationScheduler();
  }

})();

</script>
<script>
  // Initialize the persistent chamber nav — compass icon top-left.
  // Marks the Threshold as the current chamber.
  window.addEventListener("load", function(){
    if(typeof Atlas !== 'undefined' && typeof Atlas.init === 'function'){
      Atlas.init({ current: 'threshold' });
    }
  });
</script>
