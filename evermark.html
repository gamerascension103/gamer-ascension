<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Welcome to Evermark</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --gold:#c9a84c;
    --gold-bright:#e5c574;
    --bg:#050509;
    --text:#f0ece4;
  }
  html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Cinzel',serif}

  /* Stage — fills viewport, centers the vertical video card */
  .stage{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#000;
  }

  /* Video container — vertical 9:16 aspect, centered, bounded by viewport height */
  .video-card{
    position:relative;
    /* Vertical shorts are 9:16. Constrain to viewport height with aspect ratio. */
    height:min(88vh, calc(100vw * 16 / 9));
    aspect-ratio:9/16;
    max-width:90vw;
    background:#000;
    overflow:hidden;
    border-radius:4px;
    box-shadow:0 0 80px rgba(201,168,76,0.08), 0 0 200px rgba(127,119,221,0.06);
  }

  /* Iframe fills the card */
  .video-card iframe{
    position:absolute;inset:0;width:100%;height:100%;border:0;
  }

  /* Poster overlay — shown until play, covers iframe so YouTube chrome
     can't peek through. Disappears on play. */
  .poster{
    position:absolute;inset:0;z-index:2;
    background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    cursor:pointer;
    transition:opacity 0.8s ease-out;
  }
  .poster.fading{opacity:0;pointer-events:none}

  /* Title over poster — understated, sets register */
  .poster-eyebrow{
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:.4em;
    color:rgba(240,236,228,0.45);text-transform:uppercase;
    margin-bottom:24px;
    animation:poster-fade-in 1.4s ease-out forwards;opacity:0;
  }
  .poster-title{
    font-family:'Cinzel Decorative',serif;font-size:clamp(32px,6vw,52px);font-weight:700;
    color:var(--text);
    letter-spacing:.04em;line-height:1.1;
    text-shadow:0 0 30px rgba(201,168,76,0.3);
    margin-bottom:48px;
    animation:poster-fade-in 1.4s ease-out forwards 0.3s;opacity:0;
  }

  /* Play button — large gold, centered below title */
  .play-button{
    position:relative;
    width:96px;height:96px;border-radius:50%;
    background:transparent;border:1.5px solid rgba(201,168,76,0.55);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:all 0.4s ease;
    animation:poster-fade-in 1.4s ease-out forwards 0.6s, play-pulse 3s ease-in-out infinite 2s;
    opacity:0;
  }
  .play-button::after{
    content:'';
    width:0;height:0;
    border-left:22px solid var(--gold);
    border-top:14px solid transparent;
    border-bottom:14px solid transparent;
    margin-left:6px;
    transition:border-left-color 0.3s ease;
  }
  .play-button:hover{
    border-color:var(--gold-bright);
    box-shadow:0 0 40px rgba(201,168,76,0.35);
    transform:scale(1.05);
  }
  .play-button:hover::after{
    border-left-color:var(--gold-bright);
  }

  @keyframes poster-fade-in{
    from{opacity:0;transform:translateY(8px)}
    to{opacity:1;transform:translateY(0)}
  }
  @keyframes play-pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(201,168,76,0.25)}
    50%{box-shadow:0 0 0 18px rgba(201,168,76,0)}
  }

  /* Sound hint below play button */
  .sound-hint{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:.3em;
    color:rgba(240,236,228,0.3);text-transform:uppercase;
    animation:poster-fade-in 1.4s ease-out forwards 1s;opacity:0;
  }

  /* Skip button — tiny, bottom-right corner of viewport */
  .skip-btn{
    position:fixed;bottom:20px;right:24px;z-index:10;
    background:transparent;border:none;
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:.25em;
    color:rgba(240,236,228,0.35);text-transform:uppercase;
    cursor:pointer;padding:10px 14px;
    transition:color 0.3s ease;
    animation:poster-fade-in 1.4s ease-out forwards 1.5s;opacity:0;
  }
  .skip-btn:hover{color:rgba(240,236,228,0.7)}
  .skip-btn.hidden{display:none}

  /* End-of-video fade — covers everything with black to hide any
     YouTube end-screen flicker before the navigation fires */
  .end-fade{
    position:fixed;inset:0;z-index:20;background:#000;
    opacity:0;pointer-events:none;
    transition:opacity 1.1s ease-in-out;
  }
  .end-fade.active{opacity:1}

  /* Ambient starfield background — subtle, matches Evermark register */
  .starfield{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    background:
      radial-gradient(1px 1px at 12% 24%, rgba(240,236,228,0.4), transparent),
      radial-gradient(1px 1px at 78% 66%, rgba(240,236,228,0.35), transparent),
      radial-gradient(1px 1px at 44% 88%, rgba(240,236,228,0.3), transparent),
      radial-gradient(1px 1px at 85% 18%, rgba(201,168,76,0.3), transparent),
      radial-gradient(1px 1px at 25% 58%, rgba(127,119,221,0.3), transparent),
      radial-gradient(2px 2px at 62% 32%, rgba(240,236,228,0.25), transparent),
      radial-gradient(1px 1px at 8% 80%, rgba(240,236,228,0.35), transparent),
      radial-gradient(1px 1px at 92% 76%, rgba(201,168,76,0.25), transparent);
    background-size:100% 100%;
  }
</style>
</head>
<body>

<div class="starfield"></div>

<div class="stage">
  <div class="video-card" id="videoCard">
    <div class="poster" id="poster" onclick="startVideo()">
      <div class="poster-eyebrow">Welcome to</div>
      <div class="poster-title">Evermark</div>
      <button class="play-button" aria-label="Play intro" onclick="startVideo()"></button>
      <div class="sound-hint">Tap to begin · Sound on</div>
    </div>
    <div id="ytPlayer"></div>
  </div>
</div>

<button class="skip-btn" id="skipBtn" onclick="skipIntro()">Skip intro →</button>

<div class="end-fade" id="endFade"></div>

<script>
  // ============================================================
  // EVERMARK INTRO LANDING
  // ============================================================
  // First-time entry point to the Evermark experience. Plays the
  // intro video, then transitions to threshold.html on video end.
  //
  // Returning users (flag ga_evermark_intro_seen) are auto-redirected
  // on page load — they don't wait through the video again.
  //
  // The YouTube iframe API is loaded asynchronously. We intercept
  // the PLAYER_ENDED state to trigger our own transition, avoiding
  // YouTube's end-screen / related-videos flicker.

  // YouTube video ID from the shorts URL provided.
  var YT_VIDEO_ID = 'MneQX5vD1jo';
  var NEXT_PAGE = '/threshold.html';
  var SEEN_FLAG = 'ga_evermark_intro_seen';

  // Returning user — skip straight to threshold.
  try {
    if(localStorage.getItem(SEEN_FLAG) === '1'){
      window.location.replace(NEXT_PAGE);
    }
  } catch(e){ /* no localStorage, continue with video */ }

  var player = null;
  var playerReady = false;

  // Load YouTube iframe API asynchronously. When ready, it calls
  // window.onYouTubeIframeAPIReady which we define below.
  (function loadYT(){
    var tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    var first = document.getElementsByTagName('script')[0];
    first.parentNode.insertBefore(tag, first);
  })();

  window.onYouTubeIframeAPIReady = function(){
    player = new YT.Player('ytPlayer', {
      videoId: YT_VIDEO_ID,
      width: '100%',
      height: '100%',
      playerVars: {
        controls: 0,        // hide YouTube controls
        rel: 0,             // limit related videos to same channel
        modestbranding: 1,  // reduce YouTube branding
        playsinline: 1,     // prevent mobile fullscreen hijack
        fs: 0,              // disable fullscreen button
        disablekb: 1,       // disable keyboard controls
        iv_load_policy: 3,  // hide video annotations
        cc_load_policy: 0,  // no closed captions by default
      },
      events: {
        onReady: function(){ playerReady = true; },
        onStateChange: onPlayerStateChange
      }
    });
  };

  function onPlayerStateChange(e){
    // State 0 = ENDED. Trigger the transition to threshold.
    if(e.data === 0){
      transitionToThreshold();
    }
  }

  function startVideo(){
    if(!playerReady || !player){
      // API hasn't loaded yet — wait briefly and retry. On slow
      // connections this can happen if user taps before API script loads.
      setTimeout(startVideo, 200);
      return;
    }
    var poster = document.getElementById('poster');
    poster.classList.add('fading');
    // Start playback. Autoplay policies allow sound here because the
    // play is user-initiated.
    try {
      player.unMute && player.unMute();
      player.playVideo();
    } catch(e){ console.error('[Evermark] Failed to start video:', e); }
    // After poster fades, remove it from the DOM so it can't be clicked.
    setTimeout(function(){
      if(poster && poster.parentNode) poster.parentNode.removeChild(poster);
    }, 900);
  }

  function skipIntro(){
    // Mark seen and go straight to threshold.
    try { localStorage.setItem(SEEN_FLAG, '1'); } catch(e){}
    transitionToThreshold();
  }

  function transitionToThreshold(){
    // Mark intro as seen so returning users skip it.
    try { localStorage.setItem(SEEN_FLAG, '1'); } catch(e){}
    // Fade to black, then navigate.
    var fade = document.getElementById('endFade');
    fade.classList.add('active');
    setTimeout(function(){
      window.location.href = NEXT_PAGE;
    }, 1100);
  }

  // Safety: if the YouTube API takes too long, the Skip button is
  // always available for the user to bypass the intro.
</script>

</body>
</html>
